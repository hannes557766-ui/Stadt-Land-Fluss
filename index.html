<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Stadt Land Fluss</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./styles/app.css?v=connect4emptyhover1"/>
</head>
<body>

<button id="btn-leave" class="leave-btn" onclick="window.handleBackButton()">← Zurück</button>
<button class="gear-btn" onclick="window.openSettings()" title="Einstellungen">⚙️</button>

<!-- Settings Modal -->
<div class="settings-overlay hidden" id="settings-overlay" onclick="window.closeSettingsOutside(event)">
  <div class="settings-panel">
    <div class="settings-title">
      Einstellungen
      <button class="settings-close" onclick="window.closeSettings()">✕</button>
    </div>
    <div class="settings-section">Verbindung</div>
    <div class="conn-status-row">
      <div class="conn-dot sync" id="conn-dot"></div>
      <span id="conn-label">Bereit</span>
    </div>
    <div class="settings-section">Lautstärke</div>
    <div class="vol-row">
      <span class="vol-icon">🎵</span>
      <span class="vol-label">Musik</span>
      <input type="range" id="music-vol-slider" min="0" max="100" value="45"
        oninput="window.onMusicVol(this.value)"/>
      <span class="vol-pct" id="music-vol-label">45%</span>
    </div>
    <div class="vol-row">
      <span class="vol-icon">🔊</span>
      <span class="vol-label">Sound</span>
      <input type="range" id="sfx-vol-slider" min="0" max="100" value="70"
        oninput="window.onSfxVol(this.value)"/>
      <span class="vol-pct" id="sfx-vol-label">70%</span>
    </div>
    <div class="settings-section">Design</div>
    <div class="theme-grid" id="theme-grid"></div>
    <div class="settings-section">Akzentfarbe</div>
    <div class="color-swatches" id="color-swatches"></div>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="game-header">
    <div class="tape-strip"></div>
    <div class="game-title">Stadt<span class="slash">/</span>Land<span class="slash">/</span>Fluss</div>
  </div>
  <div class="home-menu">
    <button type="button" class="game-card-btn" onclick="window.selectGame('slf')">
      <span class="game-card-icon">✏️</span>
      <span class="game-card-title">Stadt Land Fluss</span>
      <span class="game-card-status">bis 12 Spieler</span>
    </button>
    <button type="button" class="game-card-btn" onclick="window.selectGame('connect4')">
      <span class="game-card-icon">🔴</span>
      <span class="game-card-title">Vier gewinnt</span>
      <span class="game-card-status">2 Spieler</span>
    </button>
    <button type="button" class="game-card-btn" onclick="window.selectGame('battleship')">
      <span class="game-card-icon">🚢</span>
      <span class="game-card-title">Schiffe versenken</span>
      <span class="game-card-status">2 Spieler</span>
    </button>
    <button type="button" class="game-card-btn" onclick="window.selectGame('kniffel')">
      <span class="game-card-icon">🎲</span>
      <span class="game-card-title">Kniffel</span>
      <span class="game-card-status">bis 8 Spieler</span>
    </button>
    <button type="button" class="game-card-btn" onclick="window.selectGame('drawing')">
      <span class="game-card-icon">🖌️</span>
      <span class="game-card-title">Montagsmaler</span>
      <span class="game-card-status">2–12 Spieler</span>
    </button>
    <button type="button" class="game-card-btn" onclick="window.selectGame('maumau')">
      <span class="game-card-icon">🃏</span>
      <span class="game-card-title">Mau Mau</span>
      <span class="game-card-status">2–8 Spieler</span>
    </button>
  </div>
</div>

<div id="screen-join" class="screen hidden" hidden>
  <div class="game-header">
    <div class="tape-strip"></div>
    <div class="game-title" id="join-game-title">Stadt<span class="slash">/</span>Land<span class="slash">/</span>Fluss</div>
  </div>
  <div class="block">
    <div class="block-title" id="join-block-title">Mitspielen</div>
    <label class="field-label">Dein Name</label>
    <input type="text" id="input-name" placeholder="Wie heißt du?" maxlength="15" autocomplete="off"/>

    <div class="join-mode-card">
      <button type="button" class="btn" id="btn-create-room" onclick="window.createRoom()">Raum erstellen →</button>
    </div>

    <div class="join-mode-card">
      <div class="join-mode-title">Bestehendem Raum beitreten</div>
      <div class="join-row">
        <input type="text" id="input-room" placeholder="z.B. WOLKE7" maxlength="10" autocomplete="off"
          onkeydown="if(event.key==='Enter'){event.preventDefault();window.joinExistingRoom();}"/>
        <button type="button" class="btn btn-outline btn-sm" id="btn-join-room" onclick="window.joinExistingRoom()">Beitreten</button>
      </div>
    </div>

    <button type="button" class="join-back-btn" onclick="window.backToHome()">← Spiele</button>
    <div id="join-error" class="error-msg" style="display:none"></div>
  </div>
</div>

<div id="screen-lobby" class="screen hidden" hidden>
  <div class="game-header">
    <div class="tape-strip"></div>
    <div class="game-title" style="font-size:2.6rem;transform:none">Warteraum</div>
  </div>
  <div class="block">
    <div class="code-box">
      <div class="the-code" id="display-roomcode">—</div>
      <span class="host-stamp" id="host-badge" style="display:none">HOST</span>
      <div class="invite-actions">
        <button type="button" class="btn btn-outline btn-sm invite-share-btn" onclick="window.shareRoomLink()">🔗 Link teilen</button>
        <div class="invite-feedback" id="invite-feedback" role="status" aria-live="polite"></div>
      </div>
    </div>
    <div id="lobby-game-overview"></div>
    <div class="lobby-section">
      <div class="lobby-section-title">Spieler</div>
      <div class="players-list" id="players-list"></div>
    </div>
    <div id="lobby-summary-area"></div>
    <div id="lobby-editor-area"></div>
    <div id="lobby-host-area" class="lobby-actions"></div>
  </div>
</div>

<div id="screen-playing" class="screen hidden" hidden>
  <div class="letter-stage">
    <span class="round-tag" id="round-badge">Runde 1</span>
    <div class="big-letter" id="big-letter">A</div>
    <div class="used-letters" id="used-letters-display"></div>
    <div class="round-progress" id="round-progress-pips"></div>
  </div>
  <div id="typing-indicators-area"></div>
  <div id="playing-content"></div>
  <div id="timer-bar-area"></div>
  <div id="buzzer-container"></div>
</div>

<div id="screen-results" class="screen hidden" hidden>
  <div class="game-header" style="margin-bottom:20px">
    <div class="tape-strip"></div>
    <div class="game-title" style="font-size:2.4rem;transform:none">Auswertung</div>
    <div class="game-sub" id="results-sub"></div>
  </div>
  <div id="gameover-area"></div>
  <div id="validation-banner-area"></div>
  <div class="section-label">Punkte gesamt</div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="section-label">Antworten dieser Runde</div>
  <div id="results-container" style="width:100%;max-width:480px"></div>
  <div style="width:100%;max-width:480px;margin-top:24px" id="results-actions"></div>
</div>
<script type="module" src="./src/app.js?v=connect4emptyhover1"></script>

</html>

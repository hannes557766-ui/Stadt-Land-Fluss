<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Stadt Land Fluss</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── VARIABLEN & GRUNDLAGEN ── */
    :root {
      --cream: #faf6ef;
      --ink: #1a1612;
      --rust: #c94a2a;
      --gold: #d4a017;
      --sage: #5c7a5a;
      --mist: #e8e2d9;
      --paper: #f2ece2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 20% 20%, rgba(201,74,42,.06) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(92,122,90,.07) 0%, transparent 50%);
    }

    /* ── LAYOUT & SCREENS ── */
    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 60px;
      animation: fadeIn .35s ease;
    }

    .screen.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAFIE ── */
    .game-header { text-align: center; margin-bottom: 32px; }
    .game-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.6rem, 10vw, 4.5rem);
      font-weight: 900;
      line-height: .95;
      color: var(--ink);
      letter-spacing: -2px;
    }
    .game-title span { color: var(--rust); font-style: italic; }
    .game-sub {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--rust);
      margin-top: 10px;
      font-weight: 600;
    }
    .section-header {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(26,22,18,.4);
      margin: 20px 0 10px;
      width: 100%;
      max-width: 440px;
    }

    /* ── UI ELEMENTE ── */
    .card {
      background: var(--paper);
      border: 1.5px solid var(--mist);
      border-radius: 20px;
      padding: 24px 22px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(26,22,18,.07);
    }
    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--ink);
    }
    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 7px;
      margin-top: 16px;
      display: block;
    }
    .label:first-child { margin-top: 0; }
    
    input[type=text] {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid var(--mist);
      border-radius: 10px;
      padding: 13px 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    input[type=text]:focus {
      border-color: var(--rust);
      box-shadow: 0 0 0 3px rgba(201,74,42,.12);
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      margin-top: 12px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--rust); color: white; box-shadow: 0 3px 14px rgba(201,74,42,.3); }
    .btn-secondary { background: var(--mist); color: var(--ink); border: 1.5px solid rgba(26,22,18,.1); }
    .btn-sm { width: auto; padding: 7px 14px; font-size: 13px; margin-top: 0; border-radius: 8px; }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── LOBBY & SPIELER ── */
    .room-code-display {
      text-align: center; background: var(--ink); color: var(--cream);
      border-radius: 14px; padding: 18px; margin-bottom: 18px;
    }
    .room-code-display .code {
      font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 900;
      letter-spacing: 8px; color: var(--gold); line-height: 1;
    }
    .room-code-display .code-hint {
      font-size: 11px; color: rgba(250,246,239,.45); margin-top: 5px;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .players-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .player-chip {
      display: inline-flex; align-items: center; gap: 6px; background: var(--cream);
      border: 1.5px solid var(--mist); border-radius: 30px; padding: 6px 14px;
      font-size: 13px; font-weight: 500;
    }
    .player-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
    
    /* ── KATEGORIEN ── */
    .cat-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--cream); border: 1.5px solid var(--mist);
      border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; font-size: 14px;
    }
    .cat-remove { background: none; border: none; cursor: pointer; color: rgba(26,22,18,.3); font-size: 18px; line-height: 1; padding: 0 4px; }
    .cats-readonly { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .cat-tag { background: var(--cream); border: 1.5px solid var(--mist); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }

    /* ── SPIEL & BUZZER ── */
    .letter-stage { text-align: center; margin: 8px 0 16px; }
    .big-letter {
      font-family: 'Fraunces', serif; font-size: clamp(6rem, 24vw, 10rem);
      font-weight: 900; font-style: italic; color: var(--rust);
      line-height: .9; text-shadow: 6px 6px 0 rgba(201,74,42,.1);
    }
    .round-badge {
      display: inline-block; background: var(--ink); color: var(--cream);
      border-radius: 20px; padding: 4px 14px; font-size: 11px;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    }
    .buzzer-wrap { width: 100%; max-width: 440px; margin-bottom: 14px; }
    .buzzer-btn {
      width: 100%; padding: 18px; border-radius: 16px; border: none;
      background: linear-gradient(135deg, #c94a2a, #e05a35); color: white;
      font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 6px 24px rgba(201,74,42,.45); transition: transform .1s;
    }
    .buzzer-btn:active { transform: scale(.96); }
    .buzzer-fired {
      text-align: center; background: var(--ink); color: var(--cream);
      border-radius: 16px; padding: 14px; margin-bottom: 14px;
      font-size: 14px; font-weight: 600; width: 100%; max-width: 440px;
    }
    .answer-form { width: 100%; max-width: 440px; }
    .answer-field {
      background: var(--paper); border: 1.5px solid var(--mist);
      border-radius: 14px; padding: 12px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .answer-field .cat-name {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--rust); min-width: 65px;
    }
    .answer-field input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1.5px solid var(--mist); padding: 4px 2px;
      font-size: 15px; color: var(--ink); outline: none;
    }

    /* ── WAITING & ERGEBNISSE ── */
    .submit-waiting { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
    .submit-waiting .check { font-size: 2.5rem; }
    .wait-players { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .wait-chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .wait-chip.done { background: var(--sage); color: white; }
    .wait-chip.pending { background: var(--mist); color: var(--ink); }
    
    .scoreboard { width: 100%; max-width: 440px; margin-bottom: 16px; }
    .score-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--paper); border: 1.5px solid var(--mist);
      border-radius: 12px; padding: 10px 16px; margin-bottom: 8px;
    }
    .score-row.score-top { border-color: var(--gold); background: #fffbf0; }
    .score-name { font-weight: 600; font-size: 14px; }
    .score-pts { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; color: var(--rust); }
    
    .result-card { background: var(--paper); border: 1.5px solid var(--mist); border-radius: 16px; padding: 16px 18px; margin-bottom: 10px; width: 100%; max-width: 440px; }
    .result-player-name { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--mist); font-size: 14px; gap: 8px; }
    .result-cat { font-size: 11px; font-weight: 600; color: rgba(26,22,18,.4); text-transform: uppercase; min-width: 55px; }
    .result-word { flex: 1; }
    
    .ai-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
    .ai-ok { background: #e8f5e9; color: #2e7d32; }
    .ai-no { background: #fdecea; color: #c62828; }
    .ai-skip { background: var(--mist); color: rgba(26,22,18,.4); }
    .ai-loading { background: #fff8e1; color: #f57f17; }
    
    .validation-banner { width: 100%; max-width: 440px; background: var(--ink); color: var(--cream); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; text-align: center; }
    .validation-banner .vb-title { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .validation-banner .vb-sub { font-size: 12px; opacity: .6; }
    
    /* ── UTILS & ANIMATIONEN ── */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-msg { color: var(--rust); font-size: 13px; margin-top: 8px; text-align: center; font-weight: 500; }
    .hint { font-size: 12px; color: rgba(26,22,18,.38); text-align: center; margin-top: 12px; }
    .divider { border: none; border-top: 1.5px solid var(--mist); margin: 16px 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; background: var(--sage); animation: pulse 2s infinite; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    
    /* ── NEUE/ANGEPASSTE ELEMENTE ── */
    .conn-indicator { position: fixed; top: 12px; right: 12px; display: flex; align-items: center; gap: 6px; background: white; border-radius: 20px; padding: 5px 10px; font-size: 11px; font-weight: 600; box-shadow: 0 2px 10px rgba(0,0,0,.1); z-index: 100; }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; }
    .conn-dot.ok { background: var(--sage); }
    .conn-dot.err { background: var(--rust); }
    .conn-dot.sync { background: var(--gold); animation: pulse 1s infinite; }

    .leave-btn { position: fixed; top: 12px; left: 12px; z-index: 100; background: white; border: 1.5px solid var(--mist); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--rust); cursor: pointer; box-shadow: 0 2px 10px rgba(0,0,0,.05); transition: transform 0.1s; display: none; }
    .leave-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<button id="btn-leave" class="leave-btn" onclick="window.leaveRoom()">⬅ Verlassen</button>

<div class="conn-indicator" id="conn-indicator">
  <div class="conn-dot sync" id="conn-dot"></div>
  <span id="conn-label">Bereit</span>
</div>

<div id="screen-join" class="screen">
  <div class="game-header">
    <div class="game-title">Stadt<br/><span>Land</span><br/>Fluss</div>
    <div class="game-sub">Multiplayer · KI-Validierung</div>
  </div>
  <div class="card">
    <div class="card-title">Mitspielen 👋</div>
    <label class="label">Dein Name</label>
    <input type="text" id="input-name" placeholder="Dein Name…" maxlength="15"/>
    <label class="label">Raum-Code</label>
    <input type="text" id="input-room" placeholder="Z.B. SPIELEN" maxlength="10"/>
    <div id="join-error" class="error-msg" style="display:none"></div>
    <button type="button" class="btn btn-primary" id="btn-connect" onclick="joinRoom()">Spiel betreten 🚀</button>
    <p class="hint">Erster im Raum = Host. Denselben Code teilen zum Mitspielen.</p>
  </div>
</div>

<div id="screen-lobby" class="screen hidden">
  <div class="game-header">
    <div class="game-title" style="font-size:2.8rem">Lobby</div>
  </div>
  <div class="card">
    <div class="room-code-display">
      <div class="code-hint">Raum-Code teilen</div>
      <div class="code" id="display-roomcode">—</div>
    </div>
    <label class="label">Spieler</label>
    <div class="players-list" id="players-list"></div>
    <hr class="divider"/>
    <label class="label">Kategorien</label>
    <div id="lobby-cats-area"></div>
    <div id="lobby-host-area" style="margin-top:18px"></div>
  </div>
</div>

<div id="screen-playing" class="screen hidden">
  <div class="letter-stage">
    <div class="round-badge" id="round-badge">Runde 1</div>
    <div class="big-letter" id="big-letter">A</div>
  </div>
  <div id="buzzer-container"></div>
  <div id="playing-content"></div>
</div>

<div id="screen-results" class="screen hidden">
  <div class="game-header" style="margin-bottom:16px">
    <div class="game-title" style="font-size:2rem">Auswertung</div>
    <div class="game-sub" id="results-sub"></div>
  </div>
  <div id="validation-banner-area"></div>
  <div class="section-header">🏆 Gesamtpunkte</div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="section-header">📋 Antworten dieser Runde</div>
  <div id="results-container" style="width:100%;max-width:440px"></div>
  <div style="width:100%;max-width:440px;margin-top:12px" id="results-actions"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── FIREBASE KONFIGURATION ──
const firebaseConfig = {
  apiKey: "AIzaSyBnmd0GcbVIFYT2aivcRpppt1h1_XX0XFY",
  authDomain: "stadtlandfluss-e5c2b.firebaseapp.com",
  projectId: "stadtlandfluss-e5c2b",
  storageBucket: "stadtlandfluss-e5c2b.firebasestorage.app",
  messagingSenderId: "84856664843",
  appId: "1:84856664843:web:47d586715de95b67a0280e",
  databaseURL: "https://stadtlandfluss-e5c2b-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── KONSTANTEN & STATE ──
const DEFAULT_CATS = ["Stadt", "Land", "Fluss", "Tier", "Beruf"];
const LETTERS = "ABCDEFGHIKLMNOPRSTW".split("");
const ROOM_EXPIRY_MS = 24 * 60 * 60 * 1000; // 24 Stunden

let myName = "";
let myRoom = "";
let myId = "p_" + Math.random().toString(36).slice(2,10);
let isHost = false;
let gameState = null;
let submitted = false;
let localAnswers = {};
let countdownInterval = null;
let buzzerTimeout = null;
let heartbeatInterval = null;
let roomListener = null; // Um sich bei Leave wieder abzumelden
let validationResults = {};
let validationDone = false;

// ── HILFSFUNKTIONEN ──
const roomRef = () => ref(db, `rooms/${myRoom}`);
const playerRef = () => ref(db, `rooms/${myRoom}/players/${myId}`);

function setConnStatus(status) {
  const dot = document.getElementById("conn-dot");
  const lbl = document.getElementById("conn-label");
  if (!dot) return;
  dot.className = "conn-dot " + status;
  lbl.textContent = status === "ok" ? "Verbunden" : status === "sync" ? "Sync…" : "Fehler";
}

function showScreen(id) {
  ["join", "lobby", "playing", "results"].forEach(s => {
    document.getElementById(`screen-${s}`).classList.toggle("hidden", s !== id);
  });
  // Zeige Verlassen-Button überall außer im Join-Screen
  document.getElementById("btn-leave").style.display = id === "join" ? "none" : "block";
}

function showError(msg) {
  const el = document.getElementById("join-error");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

function sanitizeId(str) { 
  return str.replace(/[^a-zA-Z0-9]/g, "_"); 
}

function catsToObj(arr) {
  return arr.reduce((acc, cat, i) => ({ ...acc, [String(i)]: cat }), {});
}

function objToCats(obj) {
  if (!obj) return [...DEFAULT_CATS];
  if (Array.isArray(obj)) return obj;
  return Object.keys(obj).sort((a,b) => Number(a) - Number(b)).map(k => obj[k]);
}

async function updateRoomData(patch) {
  setConnStatus("sync");
  await update(roomRef(), patch);
  setConnStatus("ok");
}

// ── SITZUNG WIEDERHERSTELLEN ──
window.addEventListener("DOMContentLoaded", () => {
  const sName = sessionStorage.getItem("slf_name");
  const sRoom = sessionStorage.getItem("slf_room");
  const sId = sessionStorage.getItem("slf_id");
  
  if (sName && sRoom && sId) {
    document.getElementById("input-name").value = sName;
    document.getElementById("input-room").value = sRoom;
    myId = sId;
    window.joinRoom();
  }
});

// ── SPIEL BEITRETEN ──
window.joinRoom = async function() {
  myName = document.getElementById("input-name").value.trim();
  myRoom = document.getElementById("input-room").value.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
  
  if (!myName || !myRoom) { 
    showError("Bitte Name und Raum-Code eingeben."); 
    return; 
  }
  
  document.getElementById("btn-connect").disabled = true;
  showError("Verbinde mit Firebase…");
  
  try {
    const snap = await get(roomRef());
    let existingRoom = snap.exists() ? snap.val() : null;
    
    // Prüfen, ob der Raum älter als 24 Stunden ist (Reset)
    if (existingRoom && existingRoom.createdAt && (Date.now() - existingRoom.createdAt > ROOM_EXPIRY_MS)) {
      existingRoom = null; 
    }
    
    if (!existingRoom) {
      isHost = true;
      await set(roomRef(), {
        host: myId,
        hostName: myName,
        players: { [myId]: { name: myName, score: 0, hb: Date.now() } },
        cats: catsToObj(DEFAULT_CATS),
        phase: "lobby",
        round: 0,
        letter: "",
        buzzer: null,
        buzzerTs: null,
        roundAnswers: {},
        validation: null,
        createdAt: Date.now() // Speichert die Erstelldauer für den Reset-Check
      });
    } else {
      isHost = existingRoom.host === myId;
      await updateRoomData({ 
        [`players/${myId}`]: { name: myName, score: existingRoom.players?.[myId]?.score || 0, hb: Date.now() } 
      });
    }
    
    // Daten in Session Storage speichern
    sessionStorage.setItem("slf_name", myName);
    sessionStorage.setItem("slf_room", myRoom);
    sessionStorage.setItem("slf_id", myId);
    
    startHeartbeat();
    
    if (roomListener) roomListener(); // Falls bereits ein Listener aktiv war
    roomListener = onValue(roomRef(), snapshot => { 
      if(snapshot.exists()) processStateUpdate(snapshot.val()); 
    });
    
  } catch(e) {
    showError("Fehler: " + e.message);
    document.getElementById("btn-connect").disabled = false;
  }
}

// ── RAUM VERLASSEN ──
window.leaveRoom = async function() {
  // Spieler aus der Firebase DB entfernen
  if (myRoom && myId) {
    try { await update(roomRef(), { [`players/${myId}`]: null }); } catch(e) {}
  }
  
  // Storage leeren
  sessionStorage.removeItem("slf_name");
  sessionStorage.removeItem("slf_room");
  sessionStorage.removeItem("slf_id");
  
  // Listener & Intervals stoppen
  if (heartbeatInterval) clearInterval(heartbeatInterval);
  if (roomListener) roomListener();
  
  // Zustand zurücksetzen
  myName = "";
  myRoom = "";
  gameState = null;
  document.getElementById("btn-connect").disabled = false;
  document.getElementById("join-error").style.display = "none";
  
  showScreen("join");
}

// ── HEARTBEAT (Online-Status) ──
function startHeartbeat() {
  if (heartbeatInterval) clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(async () => {
    try { await update(playerRef(), { hb: Date.now() }); } catch(e) {} 
  }, 3000);
}

// ── STATE MANAGEMENT ──
async function processStateUpdate(newState) {
  gameState = newState;
  isHost = gameState.host === myId;

  // Cleanup inaktiver Spieler durch den Host
  if (isHost) {
    const now = Date.now();
    const stalePlayers = Object.entries(gameState.players || {})
      .filter(([id, p]) => id !== myId && now - (p.hb || 0) > 10000)
      .map(([id]) => id);
      
    if (stalePlayers.length > 0) {
      const patch = {};
      stalePlayers.forEach(id => patch[`players/${id}`] = null);
      await updateRoomData(patch);
      return;
    }
  }
  syncUIWithPhase();
}

function syncUIWithPhase() {
  if (!gameState) return;
  const phase = gameState.phase;
  
  if (phase === "lobby") {
    resetRoundData();
    showScreen("lobby"); 
    renderLobby();
  } else if (phase === "playing" || phase === "collecting") {
    showScreen("playing"); 
    renderPlaying();
    if (phase === "collecting" && !submitted) submitAnswers();
    if (isHost) checkHostRoundEnd();
  } else if (phase === "results") {
    if (gameState.validation) {
      validationResults = gameState.validation;
      validationDone = true;
    }
    showScreen("results"); 
    renderResults();
    if (isHost && !gameState.validation) runAIValidation();
  }
}

function resetRoundData() {
  submitted = false; 
  localAnswers = {}; 
  validationResults = {}; 
  validationDone = false;
  if (countdownInterval) {
    clearInterval(countdownInterval); 
    countdownInterval = null;
  }
}

// ── RENDER LOBBY ──
function renderLobby() {
  if (!gameState) return;
  document.getElementById("display-roomcode").textContent = myRoom;
  
  const now = Date.now();
  const cats = objToCats(gameState.cats);

  // Spielerliste zeichnen
  document.getElementById("players-list").innerHTML = Object.entries(gameState.players || {}).map(([id, p]) => {
    const isOnline = now - (p.hb || 0) < 10000;
    return `<div class="player-chip">
      <div class="dot" style="background:${isOnline ? "var(--sage)" : "#ccc"}"></div>
      ${p.name}${id === gameState.host ? " 👑" : ""}
      <span style="color:var(--rust);font-weight:700;margin-left:4px">${p.score || 0}P</span>
    </div>`;
  }).join("");

  const catsArea = document.getElementById("lobby-cats-area");
  
  if (isHost) {
    const listHtml = cats.map((c, i) =>
      `<div class="cat-item">
        <span>${c}</span>
        <button type="button" class="cat-remove" onclick="window.removeCat(${i})">✕</button>
      </div>`
    ).join("");

    if (!document.getElementById("lobby-cats-list")) {
      catsArea.innerHTML = `
        <div id="lobby-cats-list">${listHtml}</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="text" id="lobby-cat-input" placeholder="Neue Kategorie…" maxlength="20"
            onkeydown="if(event.key==='Enter'){event.preventDefault();window.addCat();}"/>
          <button type="button" class="btn btn-secondary btn-sm" onclick="window.addCat()">+ Add</button>
        </div>`;
    } else {
      document.getElementById("lobby-cats-list").innerHTML = listHtml;
    }

    document.getElementById("lobby-host-area").innerHTML =
      `<button type="button" class="btn btn-primary" onclick="window.startRound()">🎲 Runde starten</button>`;
  } else {
    catsArea.innerHTML = `<div class="cats-readonly">${cats.map(c => `<div class="cat-tag">${c}</div>`).join("")}</div>`;
    document.getElementById("lobby-host-area").innerHTML =
      `<div style="text-align:center;color:rgba(26,22,18,0.4);font-size:14px;margin-top:16px">
        <span class="status-dot"></span>Warte auf Host…</div>`;
  }
}

window.addCat = async function() {
  const inp = document.getElementById("lobby-cat-input");
  if (!inp) return;
  const val = inp.value.trim();
  inp.value = "";
  if (!val) return;
  
  const cats = objToCats(gameState.cats);
  if (cats.map(c => c.toLowerCase()).includes(val.toLowerCase())) return;
  
  cats.push(val);
  await updateRoomData({ cats: catsToObj(cats) });
}

window.removeCat = async function(index) {
  const cats = objToCats(gameState.cats);
  if (cats.length <= 1) return;
  cats.splice(index, 1);
  await updateRoomData({ cats: catsToObj(cats) });
}

window.startRound = async function() {
  const letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
  await updateRoomData({
    phase: "playing",
    round: (gameState.round || 0) + 1,
    letter: letter,
    buzzer: null,
    buzzerTs: null,
    roundAnswers: {},
    validation: null
  });
  resetRoundData();
}

// ── RENDER PLAYING ──
function renderPlaying() {
  if (!gameState) return;
  const cats = objToCats(gameState.cats);
  
  document.getElementById("round-badge").textContent = `Runde ${gameState.round}`;
  document.getElementById("big-letter").textContent = gameState.letter;

  const buzzerEl = document.getElementById("buzzer-container");
  const contentEl = document.getElementById("playing-content");

  if (gameState.phase === "collecting") {
    buzzerEl.innerHTML = `<div class="buzzer-fired">⌛ Abgeben! Zeit läuft ab…</div>`;
    if (submitted) contentEl.innerHTML = renderWaitingScreen();
    return;
  }

  if (gameState.buzzer) {
    const secondsLeft = Math.max(0, 5 - Math.floor((Date.now() - (gameState.buzzerTs || Date.now())) / 1000));
    buzzerEl.innerHTML = `<div class="buzzer-fired" id="buzzer-text">🔔 ${gameState.buzzer} hat gestoppt! Noch ${secondsLeft}s!</div>`;
    if (!countdownInterval) startCountdownUI();
  } else {
    clearInterval(countdownInterval); 
    countdownInterval = null;
    buzzerEl.innerHTML = submitted ? "" :
      `<div class="buzzer-wrap"><button type="button" class="buzzer-btn" onclick="window.triggerBuzzer()">🔔 STOPP!</button></div>`;
  }

  if (submitted) { 
    contentEl.innerHTML = renderWaitingScreen(); 
    return; 
  }

  if (!contentEl.querySelector(".answer-form")) {
    contentEl.innerHTML = `
      <div class="answer-form">
        ${cats.map(cat => `
          <div class="answer-field">
            <span class="cat-name">${cat}</span>
            <input type="text" id="ans-${sanitizeId(cat)}" placeholder="${cat} mit ${gameState.letter}…" autocomplete="off"/>
          </div>`).join("")}
        <button type="button" class="btn btn-primary" style="margin-top:10px" onclick="window.submitAnswers()">✅ Fertig</button>
      </div>`;
      
    cats.forEach(cat => {
      if (localAnswers[cat]) {
        const el = document.getElementById(`ans-${sanitizeId(cat)}`);
        if (el) el.value = localAnswers[cat];
      }
    });
  }
}

function renderWaitingScreen() {
  if (!gameState) return "";
  const totalPlayers = Object.keys(gameState.players || {}).length;
  const answers = gameState.roundAnswers || {};
  
  const chipsHtml = Object.entries(gameState.players || {}).map(([id, p]) => {
    const isDone = !!answers[id];
    return `<span class="wait-chip ${isDone ? "done" : "pending"}">${isDone ? "✓" : "⏳"} ${p.name}</span>`;
  }).join("");
  
  const pendingCount = totalPlayers - Object.keys(answers).length;
  
  return `
    <div class="card">
      <div class="submit-waiting">
        <div class="check">✅</div><strong>Antworten gesendet!</strong>
        <p style="font-size:13px;color:rgba(26,22,18,0.5)">Warte auf ${Math.max(0, pendingCount)} weitere…</p>
        <div class="wait-players">${chipsHtml}</div>
      </div>
    </div>`;
}

function startCountdownUI() {
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const el = document.getElementById("buzzer-text");
    if (!el || !gameState?.buzzerTs) {
      clearInterval(countdownInterval);
      return;
    }
    const left = Math.max(0, 5 - Math.floor((Date.now() - gameState.buzzerTs) / 1000));
    el.textContent = `🔔 ${gameState.buzzer} hat gestoppt! Noch ${left}s!`;
    if (left <= 0) clearInterval(countdownInterval);
  }, 500);
}

window.triggerBuzzer = async function() {
  if (!gameState || gameState.buzzer) return;
  
  const snap = await get(ref(db, `rooms/${myRoom}/buzzer`));
  if (snap.val()) return;
  
  await updateRoomData({ buzzer: myName, buzzerTs: Date.now() });
  
  clearTimeout(buzzerTimeout);
  buzzerTimeout = setTimeout(async () => {
    const curState = (await get(roomRef())).val();
    if (curState?.phase === "playing" && curState?.buzzer) {
      await updateRoomData({ phase: "collecting" });
      
      setTimeout(async () => {
        const finalState = (await get(roomRef())).val();
        if (finalState?.phase === "collecting") await forceRoundEnd(finalState);
      }, 3500);
    }
  }, 5000);
}

window.submitAnswers = async function() {
  if (submitted) return;
  const cats = objToCats(gameState?.cats);
  const userAnswers = {};
  
  cats.forEach(cat => {
    const inputEl = document.getElementById(`ans-${sanitizeId(cat)}`);
    userAnswers[cat] = inputEl ? inputEl.value.trim() : (localAnswers[cat] || "");
  });
  
  submitted = true;
  await updateRoomData({ [`roundAnswers/${myId}`]: userAnswers });
}

// ── SCORING LOGIK ──
async function checkHostRoundEnd() {
  if (!isHost) return;
  const curState = (await get(roomRef())).val();
  if (!curState || (curState.phase !== "playing" && curState.phase !== "collecting")) return;
  
  const activePlayers = Object.entries(curState.players || {})
    .filter(([id, p]) => Date.now() - (p.hb || 0) < 12000)
    .map(([id]) => id);
    
  if (activePlayers.length > 0 && activePlayers.every(id => curState.roundAnswers?.[id])) {
    await forceRoundEnd(curState);
  }
}

async function forceRoundEnd(curState) {
  if (!curState || curState.phase === "results") return;
  calculateBaseScores(curState);
  curState.phase = "results";
  
  setConnStatus("sync");
  await set(roomRef(), curState);
  setConnStatus("ok");
}

function calculateBaseScores(state) {
  const cats = objToCats(state.cats);
  const pids = Object.keys(state.players || {});
  
  cats.forEach(cat => {
    const validAnswers = pids.map(id => {
      let val = ((state.roundAnswers?.[id]?.[cat]) || "").trim().toLowerCase();
      if (val && !val.startsWith(state.letter.toLowerCase())) val = "";
      return { id, val };
    });
    
    validAnswers.forEach(({ id, val }) => {
      if (!val) return;
      const totalValid = validAnswers.filter(a => a.val !== "").length;
      const dupes = validAnswers.filter(a => a.val === val).length;
      
      const pts = totalValid === 1 ? 20 : dupes === 1 ? 10 : 5;
      state.players[id].score = (state.players[id].score || 0) + pts;
    });
  });
}

// ── KI VALIDIERUNG (ANTHROPIC API) ──
async function runAIValidation() {
  if (!isHost || !gameState || validationDone) return;
  
  const cats = objToCats(gameState.cats);
  const answers = gameState.roundAnswers || {};
  const letter = gameState.letter;

  const toCheck = [];
  Object.entries(gameState.players || {}).forEach(([pid, p]) => {
    cats.forEach(cat => {
      const word = (answers[pid]?.[cat] || "").trim();
      if (word && word.toLowerCase().startsWith(letter.toLowerCase())) {
        toCheck.push({ pid, playerName: p.name, cat, word });
      }
    });
  });

  if (toCheck.length === 0) {
    validationDone = true;
    renderResults();
    return;
  }

  const banner = document.getElementById("validation-banner-area");
  if (banner) {
    banner.innerHTML = `
      <div class="validation-banner">
        <div class="vb-title"><span class="spinner"></span>KI prüft Antworten…</div>
        <div class="vb-sub">Dauert ein paar Sekunden</div>
      </div>`;
  }

  const prompt = `Du bist Schiedsrichter beim Spiel "Stadt Land Fluss". 
Buchstabe dieser Runde: "${letter}"
Prüfe jede Antwort: Ist das Wort real und korrekt für die Kategorie? 
Sei LOCKER – wenn das Wort existiert und passt, ist es gültig. 
Antworte NUR mit JSON:
{"results": [{"pid": "...", "cat": "...", "valid": true/false, "reason": "kurze Begründung"}]}

Zu prüfen:
${toCheck.map(x => `- pid="${x.pid}" Kategorie="${x.cat}" Antwort="${x.word}"`).join("\n")}`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "x-api-key": "DEIN_ANTHROPIC_API_KEY_HIER_EINTRAGEN", 
        "anthropic-version": "2023-06-01",
        "anthropic-dangerously-allow-browser": "true" 
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    
    if (!resp.ok) throw new Error("API Fehler");
    
    const data = await resp.json();
    const text = data.content?.map(b => b.text || "").join("") || "";
    const cleanJson = text.replace(/```json|
```/g, "").trim();
    const parsed = JSON.parse(cleanJson);

    const mappedResults = {};
    (parsed.results || []).forEach(r => {
      mappedResults[`${r.pid}__${r.cat}`] = { valid: r.valid, reason: r.reason || "" };
    });

    const curState = (await get(roomRef())).val();
    if (!curState) return;
    
    applyAIResultsToScores(curState, mappedResults);
    
    curState.validation = mappedResults;
    validationResults = mappedResults;
    validationDone = true;
    
    await updateRoomData(curState);

  } catch(e) {
    console.error("KI-Fehler:", e);
    validationDone = true;
    if (banner) {
      banner.innerHTML = `
        <div class="validation-banner" style="background:var(--mist);color:var(--ink)">
          <div class="vb-title">KI-Prüfung fehlgeschlagen</div>
          <div class="vb-sub">Punkte ohne KI-Validierung (CORS / API-Key Fehler?)</div>
        </div>`;
    }
    renderResults();
  }
}

function applyAIResultsToScores(state, aiResults) {
  const curCats = objToCats(state.cats);
  const pids = Object.keys(state.players || {});

  pids.forEach(pid => {
    let roundPts = 0;
    curCats.forEach(cat => {
      let val = (state.roundAnswers?.[pid]?.[cat] || "").trim().toLowerCase();
      if (!val || !val.startsWith(state.letter.toLowerCase())) return;
      
      const allVals = pids.map(id => (state.roundAnswers?.[id]?.[cat] || "").trim().toLowerCase())
        .filter(x => x && x.startsWith(state.letter.toLowerCase()));
        
      const dupes = allVals.filter(x => x === val).length;
      roundPts += allVals.length === 1 ? 20 : dupes === 1 ? 10 : 5;
    });
    state.players[pid].score = Math.max(0, (state.players[pid].score || 0) - roundPts);
  });

  curCats.forEach(cat => {
    const validAnswers = pids.map(id => {
      let val = (state.roundAnswers?.[id]?.[cat] || "").trim().toLowerCase();
      if (!val || !val.startsWith(state.letter.toLowerCase())) val = "";
      
      const key = `${id}__${cat}`;
      if (aiResults[key] && aiResults[key].valid === false) val = "";
      
      return { id, val };
    });
    
    validAnswers.forEach(({ id, val }) => {
      if (!val) return;
      const totalValid = validAnswers.filter(a => a.val !== "").length;
      const dupes = validAnswers.filter(a => a.val === val).length;
      
      const pts = totalValid === 1 ? 20 : dupes === 1 ? 10 : 5;
      state.players[id].score = (state.players[id].score || 0) + pts;
    });
  });
}

// ── RENDER ERGEBNISSE ──
function renderResults() {
  if (!gameState) return;
  const cats = objToCats(gameState.cats);
  
  document.getElementById("results-sub").textContent = `Runde ${gameState.round} • Buchstabe ${gameState.letter}`;

  const banner = document.getElementById("validation-banner-area");
  if (banner && validationDone && gameState.validation) {
    banner.innerHTML = `
      <div class="validation-banner" style="background:var(--sage)">
        <div class="vb-title">✅ KI hat alle Antworten geprüft</div>
        <div class="vb-sub">Ungültige Antworten wurden nicht gewertet</div>
      </div>`;
  } else if (banner && !validationDone && !isHost) {
    banner.innerHTML = `
      <div class="validation-banner">
        <div class="vb-title"><span class="spinner"></span>KI prüft Antworten…</div>
        <div class="vb-sub">Dauert ein paar Sekunden</div>
      </div>`;
  }

  const sortedPlayers = Object.entries(gameState.players || {}).sort((a,b) => (b[1].score || 0) - (a[1].score || 0));
  document.getElementById("scoreboard").innerHTML = sortedPlayers.map(([id, p], i) => `
    <div class="score-row ${i === 0 ? "score-top" : ""}">
      <div class="score-name">${i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "  "} ${p.name}</div>
      <div class="score-pts">${p.score || 0} Punkte</div>
    </div>`).join("");

  document.getElementById("results-container").innerHTML = Object.entries(gameState.players || {}).map(([pid, p]) => {
    const ans = gameState.roundAnswers?.[pid] || {};
    
    return `
      <div class="result-card">
        <div class="result-player-name">${p.name}</div>
        ${cats.map(cat => {
          const word = (ans[cat] || "").trim();
          const wrongLetter = word && !word.toLowerCase().startsWith(gameState.letter.toLowerCase());
          const key = `${pid}__${cat}`;
          const aiRes = validationResults[key];

          let display = "", badge = "";
          
          if (!word) {
            display = `<i style="color:rgba(26,22,18,.3)">—</i>`;
          } else if (wrongLetter) {
            display = `<span style="text-decoration:line-through;color:var(--rust)">${word}</span>`;
            badge = `<span class="ai-badge ai-no">Falscher Buchstabe</span>`;
          } else if (aiRes) {
            display = word;
            if (aiRes.valid) {
              badge = `<span class="ai-badge ai-ok" title="${aiRes.reason}">✓ Gültig</span>`;
            } else {
              badge = `<span class="ai-badge ai-no" title="${aiRes.reason}">✗ ${aiRes.reason || "Ungültig"}</span>`;
              display = `<span style="text-decoration:line-through;opacity:.5">${word}</span>`;
            }
          } else if (!validationDone && word && !wrongLetter) {
            display = word;
            badge = `<span class="ai-badge ai-loading">⏳ Prüft…</span>`;
          } else {
            display = word;
            badge = `<span class="ai-badge ai-skip">–</span>`;
          }

          return `
            <div class="result-row">
              <span class="result-cat">${cat}</span>
              <span class="result-word">${display}</span>
              ${badge}
            </div>`;
        }).join("")}
      </div>`;
  }).join("");

  document.getElementById("results-actions").innerHTML = isHost
    ? `<button type="button" class="btn btn-primary" onclick="window.nextRound()">Nächste Runde 🔄</button>`
    : `<div style="text-align:center;color:rgba(26,22,18,0.4);font-size:14px"><span class="status-dot"></span>Warte auf Host…</div>`;
}

window.nextRound = async function() {
  resetRoundData();
  await updateRoomData({
    phase: "lobby",
    buzzer: null,
    buzzerTs: null,
    roundAnswers: {},
    validation: null
  });
}

// ── EVENTS ──
document.addEventListener("input", e => {
  if (e.target.matches(".answer-field input") && gameState?.cats) {
    const cats = objToCats(gameState.cats);
    const cat = cats.find(c => `ans-${sanitizeId(c)}` === e.target.id);
    if (cat) localAnswers[cat] = e.target.value;
  }
});

document.getElementById("input-room").addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
});
</script>

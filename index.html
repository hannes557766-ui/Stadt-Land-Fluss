<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Stadt Land Fluss</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./styles/app.css?v=geminiloose1"/>
</head>
<body>

<button id="btn-leave" class="leave-btn" onclick="window.handleBackButton()">← Zurück</button>
<button class="gear-btn" onclick="window.openSettings()" title="Einstellungen">⚙️</button>

<!-- Settings Modal -->
<div class="settings-overlay hidden" id="settings-overlay" onclick="window.closeSettingsOutside(event)">
  <div class="settings-panel">
    <div class="settings-title">
      Einstellungen
      <button class="settings-close" onclick="window.closeSettings()">✕</button>
    </div>
    <div class="settings-section">Verbindung</div>
    <div class="conn-status-row">
      <div class="conn-dot sync" id="conn-dot"></div>
      <span id="conn-label">Bereit</span>
    </div>
    <div class="settings-section">Lautstärke</div>
    <div class="vol-row">
      <span class="vol-icon">🎵</span>
      <span class="vol-label">Musik</span>
      <input type="range" id="music-vol-slider" min="0" max="100" value="45"
        oninput="window.onMusicVol(this.value)"/>
      <span class="vol-pct" id="music-vol-label">45%</span>
    </div>
    <div class="vol-row">
      <span class="vol-icon">🔊</span>

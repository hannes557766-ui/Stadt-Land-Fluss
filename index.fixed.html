<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Stadt Land Fluss</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
:root {
  --primary-accent: #9ce866;
  --paper:        #fdfbf7;
  --paper-white:  #ffffff;
  --paper2:       #f0ede6;
  --grid:         rgba(100, 130, 190, 0.12);
  --margin:       rgba(156, 232, 102, 0.35);
  --ink:          #343a40;
  --red:          #ef4444;
  --blue:         #339af0;
  --pencil:       #868e96;
  --stamp:        #9ce866;
  --green:        #9ce866;
  --tape:         rgba(255, 243, 191, 0.9);
  --highlight:    #ffec99;
  --accent-text:  #2f3437;
  --line:         rgba(52,58,64,0.12);
  --space-1:      8px;
  --space-2:      12px;
  --space-3:      16px;
  --space-4:      24px;
  --space-5:      32px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background-color: var(--paper);
  background-image:
    linear-gradient(rgba(100, 130, 190, 0.13) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100, 130, 190, 0.13) 1px, transparent 1px),
    radial-gradient(circle at 20% 10%, rgba(52,58,64,0.014), transparent 28%);
  background-size: 24px 24px, 24px 24px, 480px 480px;
  background-position: 0 0, 0 0, 0 0;
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  left: clamp(30px, 8vw, 60px);
  top: 0; bottom: 0;
  width: 2px;
  background: color-mix(in srgb, var(--primary-accent) 45%, transparent);
  opacity: 0.5;
  z-index: 0;
  pointer-events: none;
}

body[data-theme="school"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    radial-gradient(circle at 20% 10%, rgba(52,58,64,0.014), transparent 28%);
  background-size: 24px 24px, 24px 24px, 480px 480px;
  background-position: 0 0, 0 0, 0 0;
}
body[data-theme="minimal"] {
  background-image:
    radial-gradient(circle at 30% 12%, rgba(52,58,64,0.018), transparent 28%),
    radial-gradient(circle at 80% 70%, rgba(52,58,64,0.012), transparent 32%);
  background-size: 520px 520px, 640px 640px;
}
body[data-theme="minimal"]::before { opacity: 0; }
body[data-theme="college"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    radial-gradient(circle at 25% 15%, rgba(38,50,56,0.014), transparent 30%);
  background-size: 100% 29px, 520px 520px;
  background-position: 0 10px, 0 0;
}
body[data-theme="exam"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 100% 36px;
  background-position: 0 18px;
}
body[data-theme="chalk"] {
  background-image:
    radial-gradient(circle at 18% 18%, rgba(255,255,255,0.04), transparent 28%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.025), transparent 30%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 32px;
}
body[data-theme="chalkColor"] {
  background-image:
    radial-gradient(circle at 18% 18%, rgba(255,255,255,0.05), transparent 25%),
    radial-gradient(circle at 80% 20%, rgba(255,179,199,0.06), transparent 24%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 480px 480px, 520px 520px, 100% 31px;
}
body[data-theme="night"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    radial-gradient(circle at 20% 10%, rgba(139,220,255,0.06), transparent 30%);
  background-size: 100% 32px, 520px 520px;
}
body[data-theme="neon"] {
  background-image:
    linear-gradient(rgba(0,245,212,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,92,138,0.045) 1px, transparent 1px),
    radial-gradient(circle at 80% 20%, rgba(0,245,212,0.08), transparent 30%);
  background-size: 32px 32px, 32px 32px, 620px 620px;
}
body[data-theme="pastel"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    radial-gradient(circle at 15% 15%, rgba(255,159,104,0.08), transparent 30%),
    radial-gradient(circle at 85% 65%, rgba(255,229,168,0.12), transparent 32%);
  background-size: 100% 28px, 520px 520px, 620px 620px;
}
body[data-theme="retro"] {
  background-image:
    radial-gradient(circle at 12% 18%, rgba(0,184,169,0.10), transparent 20%),
    radial-gradient(circle at 88% 12%, rgba(255,92,138,0.10), transparent 22%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 420px 420px, 520px 520px, 100% 30px;
}
body[data-theme="candy"] {
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,126,182,0.10), transparent 28%),
    radial-gradient(circle at 85% 70%, rgba(122,183,255,0.11), transparent 30%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 30px;
}
body[data-theme="forest"] {
  background-image:
    radial-gradient(circle at 18% 16%, rgba(127,166,80,0.08), transparent 28%),
    radial-gradient(circle at 80% 72%, rgba(46,53,40,0.035), transparent 32%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 650px 650px, 100% 30px;
}
body[data-theme="sea"] {
  background-image:
    radial-gradient(circle at 15% 15%, rgba(0,166,166,0.09), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(0,119,182,0.06), transparent 32%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 28px;
}
body[data-theme="sunset"] {
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,138,91,0.12), transparent 30%),
    radial-gradient(circle at 85% 68%, rgba(255,209,102,0.12), transparent 32%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 30px;
}
body[data-theme="lavender"] {
  background-image:
    radial-gradient(circle at 18% 18%, rgba(155,93,229,0.10), transparent 30%),
    radial-gradient(circle at 82% 64%, rgba(108,99,255,0.08), transparent 30%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 30px;
}
body[data-theme="blueprint"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 28px 28px, 28px 28px;
}
body[data-theme="newspaper"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    radial-gradient(circle at 30% 15%, rgba(17,17,17,0.016), transparent 30%);
  background-size: 100% 34px, 520px 520px;
}
body[data-theme="pencil"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    radial-gradient(circle at 25% 20%, rgba(47,49,51,0.018), transparent 30%);
  background-size: 100% 30px, 520px 520px;
}
body[data-theme="sport"] {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, rgba(47,179,68,0.06) 1px, transparent 1px),
    radial-gradient(circle at 80% 65%, rgba(47,179,68,0.08), transparent 30%);
  background-size: 100% 32px, 48px 48px, 580px 580px;
}
body[data-theme="winter"] {
  background-image:
    radial-gradient(circle at 20% 18%, rgba(125,211,252,0.10), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(219,234,254,0.16), transparent 32%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 30px;
}
body[data-theme="halloween"] {
  background-image:
    radial-gradient(circle at 18% 14%, rgba(255,140,66,0.08), transparent 28%),
    radial-gradient(circle at 80% 65%, rgba(155,93,229,0.08), transparent 30%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 32px;
}
body[data-theme="christmas"] {
  background-image:
    radial-gradient(circle at 18% 16%, rgba(193,18,31,0.08), transparent 28%),
    radial-gradient(circle at 82% 70%, rgba(56,102,65,0.08), transparent 30%),
    linear-gradient(var(--grid) 1px, transparent 1px);
  background-size: 520px 520px, 620px 620px, 100% 30px;
}
.screen {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 56px 20px 96px;
  animation: none;
}
.screen.hidden, [hidden] { display: none !important; }
script, style { display: none !important; }
@keyframes pageFlip {
  from { opacity: 0; transform: translateY(15px); }
  to   { opacity: 1; transform: translateY(0); }
}

.game-header {
  width: 100%; max-width: 480px;
  margin-bottom: 32px;
  position: relative;
}
.game-title {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(2.5rem, 10vw, 4.2rem);
  line-height: 0.98;
  color: var(--ink);
  letter-spacing: -0.04em;
  transform: none;
  display: inline-block;
  mix-blend-mode: normal;
  font-weight: 900;
}
.game-title .slash { color: var(--primary-accent); }
.game-sub {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--pencil);
  margin-top: 12px;
  padding-left: 4px;
  font-weight: 800;
}
.tape-strip { display: none; }
.section-label {
  font-family: 'Nunito', sans-serif;
  font-size: 11px; letter-spacing: 1.3px; text-transform: uppercase;
  color: var(--pencil); margin: 32px 0 12px;
  width: 100%; max-width: 480px;
  border-bottom: none;
  padding-bottom: 0;
}
.block {
  background: var(--paper-white);
  border: 1px solid var(--line);
  border-radius: 18px;
  width: 100%; max-width: 480px;
  padding: 28px;
  position: relative;
  box-shadow: none;
}
.block-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1.6rem;
  color: var(--ink);
  margin-bottom: 24px;
}
.join-mode-card {
  border: none;
  border-radius: 0;
  padding: 14px 0;
  margin-top: 14px;
  background: transparent;
}
.join-mode-card + .join-mode-card {
  border-top: none;
  padding-top: 8px;
  margin-top: 8px;
}
.join-mode-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  margin-bottom: 14px;
  color: var(--ink);
}
.join-mode-card .field-label { margin-bottom: 10px; }
.join-mode-card > .btn {
  margin-top: 0;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.join-row { display: flex; gap: 12px; align-items: stretch; }
.join-row input { flex: 1; height: 48px; }
.join-row .btn {
  margin-top: 0;
  height: 48px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  padding: 0 18px;
}
#screen-join .game-header { margin-bottom: 26px; }
#screen-join .game-title { font-size: clamp(2.25rem, 9vw, 3.8rem); }
#screen-join .block {
  border: none;
  box-shadow: none;
  background: transparent;
  padding: 4px 4px 36px;
}
#screen-join .block-title { margin-bottom: 18px; font-size: 1.45rem; }
#screen-join .btn-outline {
  border: none;
  background: var(--primary-accent);
  color: var(--accent-text);
}
#screen-join .btn-outline:hover { background: var(--primary-accent); }
#screen-join input[type=text] {
  border-color: transparent;
  background: var(--paper2);
}
#screen-join input[type=text]:focus {
  border-color: transparent;
  box-shadow: inset 0 -2px 0 var(--primary-accent);
  background: var(--paper-white);
}

input[type=text], input[type=number] {
  width: 100%;
  background: var(--paper2);
  border: 1.5px solid transparent;
  border-radius: 12px;
  padding: 12px 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  outline: none;
  transition: all 0.2s ease;
  -webkit-appearance: none;
}
input[type=text]::placeholder, input[type=number]::placeholder {
  color: var(--pencil);
  font-weight: 400;
}
input[type=text]:focus, input[type=number]:focus {
  background: var(--paper-white);
  border-color: var(--primary-accent);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary-accent) 15%, transparent);
}
input.typing-ok { border-color: var(--green) !important; box-shadow: 0 0 0 4px rgba(107, 201, 78, 0.15) !important;}
input.typing-bad { border-color: var(--red) !important; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15) !important;}

.field-label {
  font-family: 'Nunito', sans-serif;
  font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--pencil); margin-bottom: 8px; margin-top: 24px; display: block;
  font-weight: 800;
}
.field-label:first-child { margin-top: 0; }

.btn {
  width: 100%; padding: 14px 20px;
  border: none;
  border-radius: 12px;
  background: var(--primary-accent); color: var(--accent-text);
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 1.1rem; letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 28px;
  transition: all 0.2s ease;
  box-shadow: none;
}
.btn:hover {
  filter: none;
  transform: translateY(-2px);
  box-shadow: none;
}
.btn:active { transform: translateY(0); box-shadow: none; }
.btn-outline {
  background: var(--paper-white); color: var(--ink);
  border: 1px solid var(--line);
  box-shadow: none;
}
.btn-outline:hover { background: var(--paper2); filter: none; }
.btn-red {
  background: var(--red); color: white;
  box-shadow: none;
}
.btn-red:hover { background: #59b33e; }
.btn-sm {
  width: auto; padding: 10px 16px; font-size: 0.95rem;
  margin-top: 0;
}

.code-box {
  background: var(--paper2); color: var(--ink);
  padding: 24px; margin-bottom: 28px;
  position: relative;
  border-radius: 16px;
  border: 1px solid var(--line);
  text-align: center;
}
.code-box::before {
  content: 'DEIN RAUM-CODE';
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 11px; letter-spacing: 1.5px;
  color: var(--pencil);
  display: block; margin-bottom: 8px;
}
.code-box .the-code {
  font-family: 'Nunito', sans-serif;
  font-size: 3.2rem;
  letter-spacing: 6px;
  color: var(--ink);
  line-height: 1;
}
.host-stamp {
  position: absolute; top: -12px; right: -10px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px; letter-spacing: 2px; font-weight: bold;
  background: var(--highlight); color: var(--ink);
  border: 1px solid var(--line);
  padding: 4px 10px; transform: none;
  border-radius: 8px;
  box-shadow: 2px 2px 0 var(--ink);
}
.invite-actions {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
}
.invite-actions .btn { margin-top: 0; }
.invite-share-btn {
  min-height: 42px;
  border-radius: 999px;
  padding-left: 18px;
  padding-right: 18px;
}
.invite-feedback {
  min-height: 18px;
  max-width: 100%;
  font-size: 13px;
  line-height: 1.25;
  font-weight: 800;
  color: var(--pencil);
  overflow-wrap: anywhere;
}
.invite-feedback.good { color: var(--primary-accent); }
.invite-feedback.error { color: var(--red); }
#lobby-game-overview { width: 100%; margin-bottom: 20px; }
#lobby-game-overview:empty { display: none; }
.lobby-game-overview-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--paper-white);
  padding: 16px;
}
.lobby-game-overview-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}
.lobby-eyebrow {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--pencil);
  margin-bottom: 3px;
}
.lobby-game-overview-name {
  font-size: 1.45rem;
  font-weight: 900;
  line-height: 1.05;
  color: var(--ink);
}
.lobby-player-pill {
  flex-shrink: 0;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--paper2);
  color: var(--pencil);
  padding: 7px 11px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}
.lobby-player-pill.ready {
  background: color-mix(in srgb, var(--primary-accent) 14%, var(--paper2));
  color: var(--ink);
}
.lobby-overview-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 13px;
}
.lobby-overview-pill {
  border-radius: 999px;
  background: color-mix(in srgb, var(--primary-accent) 8%, var(--paper2));
  color: var(--ink);
  padding: 7px 11px;
  font-size: 13px;
  line-height: 1.15;
  font-weight: 800;
}
@media (max-width: 390px) {
  .lobby-game-overview-top { flex-direction: column; align-items: stretch; }
  .lobby-player-pill { width: fit-content; }
  .lobby-game-overview-name { font-size: 1.3rem; }
}
.players-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.player-chip {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 5px 12px 5px 7px;
  font-size: 15px; font-weight: 700;
  background: var(--paper-white);
}
.player-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: var(--player-color, var(--primary-accent));
  color: #fff;
  font-size: 12px;
  font-weight: 900;
  line-height: 1;
  text-shadow: 0 1px 2px rgba(0,0,0,0.32);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.26);
}
.player-avatar.score-avatar { width: 28px; height: 28px; font-size: 13px; }
.player-chip .online-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.player-chip .online-dot.online { background: var(--green); }
.player-chip .online-dot.offline { background: transparent; border: 1px solid var(--line); }
.player-chip .pts {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 12px; color: var(--primary-accent); margin-left: 4px;
}
.player-chip-name { overflow-wrap: anywhere; }
.player-kick-btn {
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, var(--red) 12%, var(--paper2));
  color: var(--red);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 900;
  line-height: 1;
  cursor: pointer;
  margin-left: 2px;
  flex-shrink: 0;
  touch-action: manipulation;
}
.player-kick-btn:hover { background: var(--red); color: white; }
.lobby-section { margin-top: 24px; }
.lobby-section-title {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--pencil);
  margin-bottom: 10px;
}
.lobby-summary-card {
  margin-top: 24px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(255,255,255,0.55);
}
.lobby-summary-card + .lobby-summary-card { margin-top: 14px; }
.lobby-cats-line { display: flex; flex-wrap: wrap; gap: 8px; }
.lobby-meta-line { display: flex; flex-wrap: wrap; gap: 8px; }
.lobby-meta-pill {
  background: var(--paper2);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 14px;
  font-weight: 800;
  color: var(--ink);
}
.lobby-editor {
  margin-top: 18px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(255,255,255,0.7);
}
.lobby-editor-group + .lobby-editor-group { margin-top: 24px; }
.lobby-editor-title {
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--pencil);
  margin-bottom: 10px;
}
.lobby-actions { margin-top: 24px; }
.lobby-host-panel,
.lobby-wait-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: color-mix(in srgb, var(--primary-accent) 7%, var(--paper-white));
  padding: 16px;
}
.lobby-host-head { margin-bottom: 14px; }
.lobby-host-head .lobby-section-title { margin-bottom: 6px; }
.lobby-host-title {
  font-size: 1.08rem;
  line-height: 1.15;
  font-weight: 900;
  color: var(--ink);
}
.lobby-host-sub {
  margin-top: 4px;
  font-size: 13px;
  line-height: 1.35;

.battleship-cell.ship::after,

.battleship-cell.ship-h-start::after,
.battleship-cell.ship-h-mid::after,
.battleship-cell.ship-h-end::after,
.battleship-cell.ship-v-start::after,
.battleship-cell.ship-v-mid::after,
.battleship-cell.ship-v-end::after { inset: 22%; border-radius: 999px; }
.battleship-cell.ship-h-start::after { left: 16%; right: -5px; top: 28%; bottom: 28%; clip-path: polygon(0 50%, 26% 0, 100% 0, 100% 100%, 26% 100%); }
.battleship-cell.ship-h-mid::after { left: -5px; right: -5px; top: 28%; bottom: 28%; border-radius: 0; }

  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--pencil);
  position: relative;
  z-index: 2;
}
.answer-sheet-head span { padding: 12px 16px; }
.answer-sheet-head span:first-child { text-align: right; padding-right: 18px; }
.answer-sheet-head span:last-child { border-left: 1.5px solid rgba(52,58,64,0.14); color: var(--ink); }
.answer-row {
  display: grid;
  grid-template-columns: 116px 1fr;
  align-items: stretch;
  gap: 0;
  margin: 0;
  min-height: 58px;
  border-bottom: 1.5px solid rgba(52,58,64,0.13);
  position: relative;
  z-index: 2;
}
.answer-row:last-child { border-bottom: none; }
.ans-cat {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 12px 18px 12px 28px;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--ink);
  text-align: right;
  background: rgba(240,237,230,0.35);
  overflow-wrap: anywhere;
}
.answer-row input[type=text] {
  height: 100%;
  min-height: 58px;
  background: transparent;
  border: none;
  border-left: 1.5px solid rgba(52,58,64,0.14);
  border-radius: 0;
  padding: 12px 16px;
  font-family: 'Nunito', sans-serif;
  font-weight: 400;
  font-size: 1.35rem;
  letter-spacing: 0.2px;
  box-shadow: none !important;
}
.answer-row input[type=text]::placeholder {
  font-family: 'Nunito', sans-serif;
  color: rgba(134,142,150,0.55);
  font-size: 1.05rem;
}
.answer-row input[type=text]:focus {
  background: color-mix(in srgb, var(--primary-accent) 6%, transparent);
  border-left-color: var(--primary-accent);
  box-shadow: inset 5px 0 0 color-mix(in srgb, var(--primary-accent) 24%, transparent) !important;
}
.answer-row input.typing-ok {
  border-left-color: var(--green) !important;
  background: rgba(107,201,78,0.06) !important;
  box-shadow: inset 5px 0 0 rgba(107,201,78,0.22) !important;
}
.answer-row input.typing-bad {
  border-left-color: var(--red) !important;
  background: rgba(239,68,68,0.06) !important;
  box-shadow: inset 5px 0 0 rgba(239,68,68,0.22) !important;
}
@media (max-width: 420px) {
  .answer-form::before { left: 96px; }
  .answer-sheet-head, .answer-row { grid-template-columns: 96px 1fr; }
  .answer-sheet-head span, .answer-row input[type=text] { padding-left: 12px; padding-right: 12px; }
  .ans-cat { font-size: 11px; padding: 10px 12px 10px 24px; }
  .answer-row input[type=text] { font-size: 1.18rem; }
}

.typing-indicators { width: 100%; max-width: 480px; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; min-height: 28px; }
.typing-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px;
  color: var(--pencil);
  background: var(--paper-white);
  border: 1px solid var(--paper2);
  border-radius: 20px; padding: 4px 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  animation: fadeInChip 0.2s ease;
}
@keyframes fadeInChip { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
.typing-dots { display: inline-flex; gap: 3px; }
.typing-dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--pencil); animation: dotBounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }

.waiting-block {
  width: 100%; max-width: 480px;
  background: var(--paper-white); border: 1px solid var(--line);
  border-radius: 20px; padding: 40px 24px; text-align: center;
  box-shadow: none;
}
.waiting-icon { font-size: 3rem; margin-bottom: 16px; }
.waiting-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 16px; }
.wait-players { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.wait-chip { padding: 6px 14px; font-size: 14px; font-weight: 700; border-radius: 20px; }
.wait-chip.done { background: var(--green); color: white; }
.wait-chip.pending { background: var(--paper2); color: var(--pencil); }

/* ── Scoreboard – erster Platz mit Akzentrand statt Gelb-Hintergrund ── */
.scoreboard { width: 100%; max-width: 480px; margin-bottom: 26px; }
.score-row {
  display: flex; align-items: center; justify-content: space-between;
  border: 1px solid var(--line); padding: 10px 14px;
  margin-bottom: 8px; background: var(--paper-white);
  border-radius: 12px;
  box-shadow: none;
}
.score-row.gold {
  border-left: 5px solid var(--primary-accent);
  background: var(--paper-white);
  box-shadow: none;
}
.score-name {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  font-size: 15px;
  font-weight: 800;
}
.score-rank {
  min-width: 20px;
  color: var(--pencil);
  font-weight: 900;
  text-align: center;
  flex-shrink: 0;
}
.score-label { overflow-wrap: anywhere; }
.score-role { color: var(--pencil); font-size: 12px; font-weight: 900; }
.score-pts { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; color: var(--primary-accent); }

/* ── Kategorie-Karten Auswertung – helleres Header-Design ── */
.cat-result-card {
  width: 100%; max-width: 480px;
  border: 1px solid var(--line); background: var(--paper-white);
  border-radius: 16px; padding: 0; margin-bottom: 14px;
  box-shadow: none;
  overflow: hidden;
}
.cat-result-header {
  background: var(--paper2);
  border-bottom: 1.5px solid rgba(52,58,64,0.12);
  padding: 10px 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.85rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--pencil);
  display: flex; align-items: center; gap: 8px;
}
.cat-result-header-name {
  color: var(--ink);
  font-size: 1rem;
  letter-spacing: 0.5px;
  text-transform: none;
}
.cat-player-row {
  display: flex; align-items: flex-start;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  gap: 12px;
  transition: background 0.15s;
  min-width: 0;
}
.cat-player-row:last-child { border-bottom: none; }
.cat-player-row.host-clickable { cursor: pointer; }
.cat-player-row.host-clickable:hover { background: var(--paper2); }
.cat-player-row.mine { background: color-mix(in srgb, var(--primary-accent) 9%, transparent); }
.cat-player-row.rejected .cat-player-word {
  text-decoration: line-through; text-decoration-color: var(--red);
  opacity: 0.5;
}
.cat-player-name {
  font-size: 11px; font-weight: 800; color: var(--pencil);
  text-transform: uppercase; letter-spacing: 0.5px;
  width: 70px; min-width: 0; flex-shrink: 0;
  overflow-wrap: anywhere;
  line-height: 1.25;
  padding-top: 2px;
}
.cat-player-word {
  font-size: 16px; font-weight: 700; color: var(--blue); flex: 1 1 auto;
  min-width: 0;
  max-width: 100%;
  white-space: normal;
  overflow: visible;
  overflow-wrap: anywhere;
  word-break: break-word;
  line-height: 1.28;
}
.cat-player-word.empty { color: rgba(134,142,150,0.5); font-style: italic; font-size: 15px; }
.cat-player-pts {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 13px; color: var(--primary-accent);
  min-width: 34px; text-align: right; flex-shrink: 0;
  white-space: nowrap;
  padding-top: 2px;
}
.cat-player-pts.zero { color: var(--pencil); opacity: 0.4; }

.vote-btn {
  width: 34px; height: 34px;
  border: 1.5px solid var(--red);
  background: var(--paper-white);
  color: var(--red);
  border-radius: 50%;
  padding: 0;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.vote-btn:hover { background: color-mix(in srgb, var(--red) 8%, var(--paper-white)); transform: translateY(-1px); }
.vote-btn.active,
.vote-btn.passed { background: var(--red); border-color: var(--red); color: white; }
.vote-count { display: none; }
.vote-note { font-size: 11px; font-weight: 800; color: var(--pencil); opacity: 0.55; white-space: nowrap; padding-top: 4px; }
@media (max-width: 430px) {
  .cat-player-row { padding: 10px 12px; gap: 8px; }
  .cat-player-name { width: 60px; font-size: 10px; }
  .cat-player-word { font-size: 15px; }
  .vote-btn { width: 32px; height: 32px; font-size: 15px; }
}


.stamp {
  font-family: 'Nunito', sans-serif; font-size: 10px;
  letter-spacing: 0.5px; padding: 4px 8px; white-space: nowrap;
  text-transform: uppercase; font-weight: bold;
  border-radius: 6px; transform: none;
  mix-blend-mode: normal;
  animation: none;
}
@keyframes stampIn { 0% { opacity: 0; transform: scale(2) rotate(-10deg); } 100% { opacity: 1; transform: scale(1) rotate(-2deg); } }
.stamp-ok { border: 2px solid var(--green); color: var(--green); }
.stamp-no { border: 2px solid var(--red); color: var(--red); }

.val-banner {
  width: 100%; max-width: 480px;
  border: 1px solid var(--line); background: var(--highlight); color: var(--ink);
  border-radius: 16px; padding: 16px 20px; margin-bottom: 28px; text-align: center;
  box-shadow: none;
}
.val-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 4px; }
.round-ended-note {
  width: 100%; max-width: 480px;
  margin: 0 0 20px;
  padding: 10px 14px;
  border-radius: 12px;
  background: color-mix(in srgb, var(--primary-accent) 16%, var(--paper-white));
  color: var(--ink);
  font-size: 14px;
  font-weight: 800;
  text-align: center;
}
.gameover-banner {
  width: 100%; max-width: 480px;
  border: none; background: var(--primary-accent); color: var(--accent-text);
  border-radius: 20px; padding: 24px; margin-bottom: 28px; text-align: center;
  box-shadow: none;
}
.gameover-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.8rem; margin-bottom: 6px; }
.gameover-winner { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; }

.round-progress { display: flex; gap: 6px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.round-pip { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--pencil); }
.round-pip.done { background: var(--pencil); }
.round-pip.current { background: var(--primary-accent); border-color: var(--primary-accent); }
.round-pip.future { background: transparent; }

.conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.conn-dot.ok { background: var(--green); }
.conn-dot.sync { background: #f59e0b; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Einstellungs-Button – oben rechts ── */
.gear-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 250;
  width: 46px; height: 46px;
  background: var(--paper-white);
  border: 1px solid var(--line);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: none;
  transition: all 0.2s;
}
.gear-btn:hover { background: var(--paper2); transform: none; }


body[data-theme="chalk"] input[type=text], body[data-theme="chalk"] input[type=number],
body[data-theme="night"] input[type=text], body[data-theme="night"] input[type=number] {
  color: var(--ink);
}
body[data-theme="chalk"] input::placeholder,
body[data-theme="night"] input::placeholder { color: var(--pencil); }
body[data-theme="chalk"] .lobby-summary-card,
body[data-theme="chalk"] .lobby-editor,
body[data-theme="night"] .lobby-summary-card,
body[data-theme="night"] .lobby-editor {
  background: color-mix(in srgb, var(--paper-white) 88%, transparent);
}


.home-menu {
  width: 100%;
  max-width: 520px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.game-card-btn {
  width: 100%;
  min-height: 148px;
  aspect-ratio: 1 / 1;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: color-mix(in srgb, var(--paper-white) 84%, transparent);
  color: var(--ink);
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  font-family: 'Nunito', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 9px;
  transition: background 0.18s, border-color 0.18s, transform 0.18s;
}
.game-card-btn:hover {
  background: var(--paper-white);
  border-color: color-mix(in srgb, var(--primary-accent) 55%, var(--line));
  transform: translateY(-2px);
}
.game-card-btn.disabled {
  cursor: default;
  opacity: 0.58;
}
.game-card-btn.disabled:hover {
  transform: none;
  background: color-mix(in srgb, var(--paper-white) 84%, transparent);
  border-color: var(--line);
}
.game-card-icon {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  background: var(--paper2);
  font-size: 24px;
  flex-shrink: 0;
}
.game-card-title {
  font-weight: 900;
  font-size: 1rem;
  line-height: 1.12;
  overflow-wrap: anywhere;
}
.game-card-sub { display: none; }
.game-card-status {
  font-size: 12px;
  line-height: 1.1;
  font-weight: 900;
  color: var(--pencil);
  white-space: normal;
}
@media (max-width: 360px) {
  .home-menu { gap: 10px; }
  .game-card-btn { min-height: 132px; border-radius: 18px; padding: 12px 8px; gap: 8px; }
  .game-card-icon { width: 42px; height: 42px; border-radius: 14px; font-size: 21px; }
  .game-card-title { font-size: 0.92rem; }
  .game-card-status { font-size: 11px; }
}
.join-back-btn { display: none !important; }

/* ── Settings Modal ── */
.settings-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(52, 58, 64, 0.4);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeOverlay 0.2s ease;
}
.settings-overlay.hidden { display: none; }
@keyframes fadeOverlay { from { opacity:0; } to { opacity:1; } }
.settings-panel {
  background: var(--paper-white);
  border-radius: 24px 24px 0 0;
  border: 1px solid var(--line);
  border-bottom: none;
  width: 100%; max-width: 480px;
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  padding: 28px 28px calc(48px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
  animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.settings-title {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.4rem;
  margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;
}
.settings-close {
  background: var(--paper2); border: none; border-radius: 50%;
  width: 32px; height: 32px; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.settings-close:hover { background: var(--paper); }
.settings-section { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 11px;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--pencil);
  margin: 20px 0 10px; }
.theme-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.theme-chip {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--paper2);
  color: var(--ink);
  min-height: 44px;
  padding: 9px 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  text-align: left;
}
.theme-chip.active { border-color: var(--primary-accent); background: color-mix(in srgb, var(--primary-accent) 16%, var(--paper-white)); }
.theme-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--line); flex-shrink: 0; }
.color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
.color-swatch {
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent;
  transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: var(--ink); transform: scale(1.1); }
.conn-status-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700; color: var(--pencil);
  padding: 10px 0;
}
.vol-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.vol-row:last-child { border-bottom: none; }
.vol-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
.vol-label { font-size: 14px; font-weight: 700; min-width: 52px; }
.vol-pct { font-size: 13px; font-weight: 800; color: var(--primary-accent); min-width: 36px; text-align: right; }
input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 6px; border-radius: 4px;
  background: var(--paper2); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary-accent); border: 2px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15); cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary-accent); border: 2px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15); cursor: pointer;
}

.leave-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 260;
  background: var(--paper-white);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 9px 15px;
  min-height: 42px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 900;
  color: var(--ink);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.18s, border-color 0.18s, transform 0.18s;
  box-shadow: none;
  touch-action: manipulation;
}
.leave-btn:hover {
  background: var(--paper2);
  border-color: color-mix(in srgb, var(--primary-accent) 42%, var(--line));
  transform: translateY(-1px);
}

.error-msg { color: var(--red); font-size: 14px; margin-top: 12px; font-weight: 700; text-align: center; }
.hint { font-size: 13px; color: var(--pencil); text-align: center; margin-top: 16px; font-weight: 600; }
.divider { border: none; border-top: 1.5px solid var(--paper2); margin: 24px 0; width: 100%; max-width: 480px; }
.pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 8px; animation: blink 2s infinite; }

.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 16px; font-weight: 700; }
.toggle-row:last-child { border-bottom: none; }
.toggle-switch {
  position: relative; width: 48px; height: 26px;
  background: var(--paper2); border: 1px solid var(--line);
  border-radius: 13px; cursor: pointer; transition: background 0.3s, border-color 0.3s;
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--green); border-color: var(--green); }
.toggle-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 18px; height: 18px; border-radius: 50%;
  background: white; border: 1px solid var(--line);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toggle-switch.on::after { transform: translateX(22px); border-color: var(--green); }

/* ── Mau Mau ── */
.maumau-game {
  width: 100%;
  max-width: 560px;
  display: grid;
  gap: 16px;
}
.maumau-panel {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--paper-white);
  padding: 16px;
}
.maumau-title { font-size: 1.15rem; font-weight: 900; margin-bottom: 4px; }
.maumau-sub { color: var(--pencil); font-size: 13px; font-weight: 800; }
.maumau-active-color {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--paper-white);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-weight: 900;
}
.maumau-active-color .label {
  color: var(--pencil);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.maumau-active-color .value {
  font-size: 1.05rem;
  white-space: nowrap;
}
.maumau-active-color.red { border-color: rgba(239,68,68,0.35); background: #fee2e2; }

.maumau-card.yellow { background: linear-gradient(160deg,#fef3c7,#fde68a); color: #78350f; border-color: rgba(120,53,15,0.22); }
.maumau-card.green { background: linear-gradient(160deg,#dcfce7,#bbf7d0); color: #14532d; border-color: rgba(20,83,45,0.22); }
.maumau-card.blue { background: linear-gradient(160deg,#dbeafe,#bfdbfe); color: #1e3a8a; border-color: rgba(30,58,138,0.22); }

.maumau-card.back {

.maumau-card-symbol {

.maumau-card.number .maumau-card-symbol { font-size: 2.65rem; }
.maumau-card.special .maumau-card-symbol { font-size: 1.75rem; }
.maumau-card-label { font-size: 0.72rem; text-align: center; margin-top: 7px; line-height: 1.05; }
.maumau-hand {

}
.maumau-hand .maumau-card,
.maumau-hand .maumau-card-btn { flex: 0 0 auto; width: 70px; min-height: 102px; }
.maumau-card-btn {
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  touch-action: manipulation;
}
.maumau-card-btn:disabled { cursor: default; opacity: 0.58; }
.maumau-card-btn .maumau-card { width: 100%; min-height: 100%; }
.maumau-card.playable {

  transform: none;
}
.maumau-card.unplayable { filter: grayscale(0.22); opacity: 0.58; }
.maumau-card.placed { animation: mauMauPlace 0.34s ease-out; }
.maumau-card.drawn { animation: mauMauDraw 0.34s ease-out; }
.maumau-card-btn:not(:disabled):active .maumau-card { transform: translateY(1px) scale(0.98); }
.maumau-action-banner { animation: mauMauActionPop 0.32s ease-out; }
@keyframes mauMauPlace {

}
@keyframes mauMauDraw {

}
@keyframes mauMauActionPop {

}
.maumau-players { display: grid; gap: 8px; }
.maumau-player-row {

}

}
.maumau-mau-badge {

}

}
.maumau-actions { display: grid; gap: 10px; }
.maumau-actions .btn { margin-top: 0; }
.maumau-color-choice {

  border: 1px solid var(--line);
  border-radius: 16px;

}
.maumau-color-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
.maumau-color-btn {

.maumau-color-btn.yellow { background:#fef3c7; color:#92400e; border-color:rgba(146,64,14,0.24); }
.maumau-color-btn.green { background:#dcfce7; color:#166534; border-color:rgba(22,101,52,0.24); }

@media (max-width: 430px) {

  .maumau-hand .maumau-card { width: 62px; min-height: 92px; }
  .maumau-card-symbol { font-size: 1.25rem; }
  .maumau-card.number .maumau-card-symbol { font-size: 2.25rem; }
  .maumau-card.special .maumau-card-symbol { font-size: 1.45rem; }
  .maumau-card-label { font-size: 0.66rem; }

/* ── Montagsmaler ── */
.drawing-game {

}
.drawing-panel {

}

.drawing-word-card {

}

.drawing-tool-title {

.drawing-tool-row {

}
.drawing-color-btn {

  border-radius: 50%;

}
.drawing-color-btn.active {

}
.drawing-tool-btn {
  border: 1px solid var(--line);

.drawing-guess-row {

.drawing-guess-row .btn {

.drawing-correct-banner {

}
@keyframes drawingPop {

.drawing-pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
.drawing-pill {

@media (max-width: 430px) {

/* ── Kniffel ── */
.kniffel-game {
  width: 100%;
  max-width: 560px;
  display: grid;
  gap: 16px;
}
.kniffel-panel {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--paper-white);
  padding: 16px;
}
.kniffel-title {
  font-size: 1.15rem;
  font-weight: 900;
  margin-bottom: 4px;
}
.kniffel-sub {
  color: var(--pencil);
  font-size: 13px;
  font-weight: 800;
}
.kniffel-dice-row {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  margin-top: 14px;
}
.kniffel-die {
  aspect-ratio: 1 / 1;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--paper-white);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  font-size: clamp(1.6rem, 9vw, 2.5rem);
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  box-shadow: inset 0 -3px 0 rgba(52,58,64,0.08);
  user-select: none;
  position: relative;
  min-width: 0;
  touch-action: manipulation;
}
.kniffel-die.clickable { cursor: pointer; }
.kniffel-die.held {
  background: color-mix(in srgb, var(--primary-accent) 22%, var(--paper-white));
  border-color: var(--primary-accent);
  box-shadow: inset 0 0 0 2px var(--primary-accent);
}
.kniffel-die.held::before {
  content: '✓';
  position: absolute;
  top: 5px;
  right: 7px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--primary-accent);
  color: var(--accent-text);
  font-size: 12px;
  line-height: 18px;
  text-align: center;
  font-weight: 900;
}
.kniffel-die-face {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  pointer-events: none;
  transform-origin: center;
}
.kniffel-die.rolling {
  background: color-mix(in srgb, var(--primary-accent) 10%, var(--paper-white));
  border-color: color-mix(in srgb, var(--primary-accent) 55%, var(--line));
}
.kniffel-die-face.rolling {
  animation: kniffelRoll 0.18s linear infinite;
}
@keyframes kniffelRoll {
  0% { transform: translateY(0) rotate(0deg) scale(1); }
  25% { transform: translateY(-2px) rotate(-10deg) scale(1.08); }
  50% { transform: translateY(1px) rotate(9deg) scale(0.96); }
  75% { transform: translateY(-1px) rotate(5deg) scale(1.05); }
  100% { transform: translateY(0) rotate(0deg) scale(1); }
}
.kniffel-actions {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}
.kniffel-actions .btn { margin-top: 0; }
.kniffel-entry-panel {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--paper-white);
  padding: 16px;
}
.kniffel-entry-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.kniffel-entry-title {
  font-size: 1rem;
  font-weight: 900;
}
.kniffel-entry-sub {
  color: var(--pencil);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}
.kniffel-entry-groups { display: grid; gap: 12px; }
.kniffel-entry-group-title {
  color: var(--pencil);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.kniffel-entry-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.kniffel-entry-btn {
  border: 1px solid var(--line);
  border-radius: 13px;
  background: color-mix(in srgb, var(--primary-accent) 12%, var(--paper-white));
  color: var(--ink);
  padding: 10px 11px;
  font-family: 'Nunito', sans-serif;

.kniffel-entry-btn:hover { border-color: var(--primary-accent); background: color-mix(in srgb, var(--primary-accent) 20%, var(--paper-white)); }
.kniffel-entry-label {

  text-align: left;

.kniffel-entry-score {

.kniffel-score-wrap {

.kniffel-score-btn {

.kniffel-result-name { font-size: 1rem; font-weight: 900; overflow-wrap: anywhere; }

let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
  return audioCtx;
}
function playTone(type, freq, duration, gain=0.3, delay=0){
  if(sfxVolume<=0) return;
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq, ctx.currentTime+delay);
    g.gain.setValueAtTime(0, ctx.currentTime+delay);
    g.gain.linearRampToValueAtTime(gain*sfxVolume, ctx.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+duration);
    osc.start(ctx.currentTime+delay);
    osc.stop(ctx.currentTime+delay+duration+0.05);
  }catch(e){}
}

// ── MUSIC ENGINE ──
let musicGain=null, musicNodes=[], musicPlaying=false, musicPhase=null;
function getMusicGain(){
  const ctx=getAudioCtx();
  if(!musicGain){ musicGain=ctx.createGain(); musicGain.connect(ctx.destination); }
  musicGain.gain.setTargetAtTime(musicVolume, ctx.currentTime, 0.1);
  return musicGain;
}
function stopMusic(fadeSecs=1.2){
  if(!musicGain) return;
  const ctx=getAudioCtx();
  musicGain.gain.setTargetAtTime(0, ctx.currentTime, fadeSecs/4);
  setTimeout(()=>{
    musicNodes.forEach(n=>{ try{ n.stop(); }catch(e){} });
    musicNodes=[];
    musicPlaying=false;
    musicPhase=null;
  }, fadeSecs*1000+200);
}
function playLobbyMusic(){
  if(musicPhase==="lobby") return;
  stopMusic(0.6);
  musicPhase="lobby";

}
function _startLobbyLoop(){
  const ctx=getAudioCtx();
  const mg=getMusicGain();
  const BPM=108, beat=60/BPM, chord=beat*2;
  const chords=[ [261,330,392], [220,261,330], [174,220,261], [196,247,330] ];
  const totalLen=chord*chords.length;
  function loop(){
    if(musicPhase!=="lobby"||musicVolume<=0) return;
    chords.forEach((freqs,ci)=>{
      freqs.forEach(freq=>{
        const osc=ctx.createOscillator();
        const g=ctx.createGain();
        osc.connect(g); g.connect(mg);
        osc.type='triangle';
        osc.frequency.value=freq;
        const start=ctx.currentTime+ci*chord;
        g.gain.setValueAtTime(0,start);
        g.gain.linearRampToValueAtTime(0.06, start+0.04);
        g.gain.setValueAtTime(0.06, start+chord-0.08);
        g.gain.linearRampToValueAtTime(0, start+chord);
        osc.start(start); osc.stop(start+chord+0.05);
        musicNodes.push(osc);
      });
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
      const src=ctx.createBufferSource(); src.buffer=buf;
      const kg=ctx.createGain(); kg.gain.value=0.08;
      src.connect(kg); kg.connect(mg);
      src.start(ctx.currentTime+ci*chord);
      musicNodes.push(src);
    });
    setTimeout(loop, totalLen*1000-50);
  }
  loop();
  musicPlaying=true;
}
function playGameMusic(){
  if(musicPhase==="game") return;
  stopMusic(0.5);
  musicPhase="game";
  if(musicVolume<=0) return;
  setTimeout(()=>{ if(musicPhase!=="game") return; _startGameLoop(); }, 600);
}
function _startGameLoop(){
  const ctx=getAudioCtx();
  const mg=getMusicGain();
  const BPM=126, beat=60/BPM;
  const bassNotes=[110,110,130,110, 98,110,130,147];
  const stepLen=beat*0.5;
  const totalLen=stepLen*bassNotes.length;
  function makeNoise(start, dur, gainVal){
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const g=ctx.createGain(); g.gain.value=gainVal;
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6000;
    src.connect(hp); hp.connect(g); g.connect(mg);
    src.start(start); src.stop(start+dur+0.01);
    musicNodes.push(src);
  }
  function loop(){
    if(musicPhase!=="game"||musicVolume<=0) return;
    const now=ctx.currentTime;
    bassNotes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const g=ctx.createGain();
      osc.connect(g); g.connect(mg);
      osc.type='sawtooth';
      osc.frequency.value=freq;
      const s=now+i*stepLen;
      g.gain.setValueAtTime(0,s);
      g.gain.linearRampToValueAtTime(0.07,s+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,s+stepLen*0.85);
      osc.start(s); osc.stop(s+stepLen);
      musicNodes.push(osc);
    });
    for(let i=0;i<bassNotes.length;i++) makeNoise(now+i*stepLen, 0.05, 0.04);
    [0,2].forEach(b=>{
      const ks=ctx.createOscillator();
      const kg=ctx.createGain();
      ks.connect(kg); kg.connect(mg);
      ks.type='sine'; ks.frequency.setValueAtTime(150,now+b*beat);
      ks.frequency.exponentialRampToValueAtTime(40, now+b*beat+0.12);
      kg.gain.setValueAtTime(0.12,now+b*beat);
      kg.gain.exponentialRampToValueAtTime(0.001,now+b*beat+0.15);
      ks.start(now+b*beat); ks.stop(now+b*beat+0.2);
      musicNodes.push(ks);
    });
    [1,3].forEach(b=>makeNoise(now+b*beat, 0.1, 0.06));
    setTimeout(loop, totalLen*1000-30);
  }
  loop();
  musicPlaying=true;
}
function playResultsMusic(){
  if(musicPhase==="results") return;
  stopMusic(0.8);
  musicPhase="results";
  if(musicVolume<=0) return;
  setTimeout(()=>{ if(musicPhase!=="results") return; _startResultsLoop(); }, 900);
}
function _startResultsLoop(){
  const ctx=getAudioCtx();
  const mg=getMusicGain();
  const chord=1.8;
  const chords=[ [261,330,392,523], [220,277,330,440], [174,220,261,349], [196,247,294,392] ];
  function loop(){
    if(musicPhase!=="results"||musicVolume<=0) return;
    chords.forEach((freqs,ci)=>{
      freqs.forEach(freq=>{
        const osc=ctx.createOscillator();
        const g=ctx.createGain();
        osc.connect(g); g.connect(mg);
        osc.type='sine';
        osc.frequency.value=freq;
        const s=ctx.currentTime+ci*chord;
        g.gain.setValueAtTime(0,s);
        g.gain.linearRampToValueAtTime(0.04,s+0.15);
        g.gain.setValueAtTime(0.04,s+chord-0.3);
        g.gain.linearRampToValueAtTime(0,s+chord);
        osc.start(s); osc.stop(s+chord+0.1);
        musicNodes.push(osc);
      });
    });
    setTimeout(loop, chords.length*chord*1000-100);
  }
  loop();
  musicPlaying=true;
}
function updateMusicVolume(){
  if(musicGain){
    const ctx=getAudioCtx();
    musicGain.gain.setTargetAtTime(musicVolume, ctx.currentTime, 0.1);
  }
  if(musicVolume>0 && !musicPlaying && musicPhase){
    const p=musicPhase; musicPhase=null;
    if(p==="lobby") playLobbyMusic();
    else if(p==="game") playGameMusic();
    else if(p==="results") playResultsMusic();
  }
  if(musicVolume<=0) { musicPlaying=false; }
}

function themeById(id){return THEMES.find(t=>t.id===id)||THEMES[0];}
function applyTheme(id,{save=true,useThemeAccent=true}={}){
  const theme=themeById(id);
  currentTheme=theme.id;
  Object.entries(theme.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  if(document.body) document.body.dataset.theme=theme.id;
  if(save) localStorage.setItem("slf_theme",theme.id);
  if(useThemeAccent) applyAccent(theme.accent,{save});
  renderThemes();
}
function applyAccent(hex,{save=true}={}){
  currentAccent = hex;
  document.documentElement.style.setProperty("--primary-accent", hex);
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty("--margin", `rgba(${r},${g},${b},0.35)`);
  document.documentElement.style.setProperty("--stamp", hex);
  document.documentElement.style.setProperty("--green", hex);
  if(save) localStorage.setItem("slf_accent", hex);
  renderSwatches();
}

function stableHash(s){
  let h=0;
  String(s||"").split("").forEach(ch=>{ h=((h<<5)-h)+ch.charCodeAt(0); h|=0; });
  return Math.abs(h);
}
function validPlayerColor(color){
  return /^#[0-9a-f]{6}$/i.test(String(color||""));
}
function sanitizePlayerColor(color,id=""){
  const c=String(color||"").trim();
  if(validPlayerColor(c))return c;
  return PLAYER_AVATAR_COLORS[stableHash(id)%PLAYER_AVATAR_COLORS.length];
}
function preferredPlayerColor(id,players={}){
  const used=new Set(Object.entries(players||{}).filter(([pid])=>pid!==id).map(([pid,p])=>sanitizePlayerColor(p?.color,pid)));
  const start=stableHash(id)%PLAYER_AVATAR_COLORS.length;
  for(let offset=0;offset<PLAYER_AVATAR_COLORS.length;offset++){
    const color=PLAYER_AVATAR_COLORS[(start+offset)%PLAYER_AVATAR_COLORS.length];
    if(!used.has(color))return color;
  }
  return PLAYER_AVATAR_COLORS[start];
}
function playerInitial(name){
  const clean=String(name||"?").trim();
  const first=Array.from(clean)[0]||"?";
  return first.toLocaleUpperCase("de-DE");
}
function playerAvatarHtml(id,p={},extraClass=""){

}

function mergeConnect4Boards(primary, fallback){
  const board=normalizeConnect4Board(primary);
  const old=normalizeConnect4Board(fallback);
  for(let i=0;i<42;i++){
    // Vier-gewinnt-Steine verschwinden innerhalb einer laufenden Runde nie.
    // Wenn ein Firebase-Update kurzzeitig eine ältere/ausgedünnte Board-Version liefert,
    // behalten wir bekannte belegte Felder bei.
    if(!board[i]&&old[i]) board[i]=old[i];
  }
  return board;
}
function connect4BoardsEqual(a,b){
  const aa=normalizeConnect4Board(a), bb=normalizeConnect4Board(b);
  return aa.every((v,i)=>v===bb[i]);
}
function stabilizeConnect4State(newState){
  if(newState?.gameType!=="connect4"||!gameState?.connect4||!newState.connect4)return newState;
  const oldC4=gameState.connect4;
  const newC4=newState.connect4;
  const sameRound=String(oldC4.round||0)===String(newC4.round||0);
  if(newState.phase==="playing"&&gameState.phase==="playing"&&sameRound){
    const oldMove=safeNum(oldC4.moveCount), newMove=safeNum(newC4.moveCount);
    const oldBoard=normalizeConnect4Board(oldC4.board);
    const newBoard=normalizeConnect4Board(newC4.board);
    const oldCount=connect4PieceCount(oldBoard), newCount=connect4PieceCount(newBoard);
    if(newMove<oldMove){
      return {...newState, connect4:{...newC4,...oldC4,board:oldBoard}};
    }
    if(newMove===oldMove&&newCount<oldCount){
      return {...newState, connect4:{...newC4,...oldC4,board:oldBoard}};
    }
    const mergedBoard=mergeConnect4Boards(newBoard,oldBoard);
    if(!connect4BoardsEqual(mergedBoard,newBoard)){
      return {...newState, connect4:{...newC4,board:mergedBoard}};
    }
  }
  return newState;
}

function normalizeKniffelCategoryScore(catId,value){

function normalizeKniffelState(raw,players={}){
  const source=(raw&&typeof raw==="object")?raw:{};
  const playerIds=Object.keys(players||{});
  const sourceOrder=Array.isArray(source.order)?source.order.map(String):[];
  let phase=["lobby","playing","results"].includes(source.phase)?source.phase:"lobby";
  let order=[...new Set(sourceOrder.filter(id=>players[id]))];
  if(phase==="lobby"||order.length===0){
    playerIds.forEach(id=>{ if(!order.includes(id)) order.push(id); });
  }
  const scores=normalizeKniffelScores(source.scores,order);
  let dice=normalizeKniffelDice(source.dice);
  let held=normalizeKniffelHeld(source.held);
  let rolls=Math.max(0,Math.min(3,Math.floor(safeNum(source.rolls))));
  if(rolls===0||dice.some(n=>n<1||n>6)){
    rolls=0;
    dice=emptyKniffelDice();
    held=emptyKniffelHeld();
  }
  let turn=source.turn&&order.includes(source.turn)?source.turn:null;
  if(phase==="playing"){
    const active=order.filter(id=>!kniffelPlayerComplete(scores[id]||{}));
    if(active.length===0&&order.length>0){
      phase="results";
      turn=null;
    }else{
      if(!turn||kniffelPlayerComplete(scores[turn]||{})) turn=active[0]||null;
    }
  }else{
    turn=null;
  }
  if(phase==="results"){
    dice=emptyKniffelDice();
    held=emptyKniffelHeld();
    rolls=0;
  }
  let rollingUntil=Math.max(0,Math.floor(safeNum(source.rollingUntil)));
  let rollingNonce=Math.max(0,Math.floor(safeNum(source.rollingNonce)));
  let rollingMask=normalizeKniffelRollingMask(source.rollingMask);
  if(phase!=="playing"||rolls===0||rollingUntil<=Date.now()){
    rollingUntil=0;
    rollingMask=emptyKniffelRollingMask();
  }
  let winner=source.winner&&order.includes(source.winner)?source.winner:null;
  if(phase==="results"&&!winner) winner=kniffelWinnerId({players,kniffel:{phase,order,scores}})||null;
  return {
    phase,
    order,
    turn,
    scores,
    dice,
    held,
    rolls,
    round:Math.max(0,Math.floor(safeNum(source.round))),
    rollingUntil,
    rollingNonce,
    rollingMask,
    winner,
    lastScore:normalizeKniffelLastScore(source.lastScore,order)
  };
}
function reconcileKniffelStatePatch(state){
  if(!state||state.gameType!=="kniffel")return null;
  const players=state.players||{};
  const raw=state.kniffel||{};
  const normalized=normalizeKniffelState(raw,players);
  const patch={};

  // Wichtig: Firebase speichert leere Objekte und null-Felder nicht zuverlässig.
  // Deshalb nicht den kompletten normalisierten State zurückschreiben, sonst entsteht
  // in der Lobby eine Endlos-Reparatur und der Raum wird scheinbar nicht erstellt.
  if(state.phase==="lobby"){
    const desiredOrder=Object.keys(players||{});
    const rawOrder=Array.isArray(raw.order)?raw.order.filter(id=>players[id]):[];
    if(raw.phase!=="lobby") patch["kniffel/phase"]="lobby";
    if(JSON.stringify(rawOrder)!==JSON.stringify(desiredOrder)) patch["kniffel/order"]=desiredOrder;
    if(safeNum(raw.rolls)!==0) patch["kniffel/rolls"]=0;
    if(JSON.stringify(normalizeKniffelDice(raw.dice))!==JSON.stringify(emptyKniffelDice())) patch["kniffel/dice"]=emptyKniffelDice();
    if(JSON.stringify(normalizeKniffelHeld(raw.held))!==JSON.stringify(emptyKniffelHeld())) patch["kniffel/held"]=emptyKniffelHeld();
    if(raw.turn!=null) patch["kniffel/turn"]=null;
    if(safeNum(raw.rollingUntil)!==0) patch["kniffel/rollingUntil"]=0;
    if(JSON.stringify(normalizeKniffelRollingMask(raw.rollingMask))!==JSON.stringify(emptyKniffelRollingMask())) patch["kniffel/rollingMask"]=emptyKniffelRollingMask();
    if(raw.winner!=null) patch["kniffel/winner"]=null;
    if(raw.lastScore!=null) patch["kniffel/lastScore"]=null;
    return Object.keys(patch).length?patch:null;
  }

  if(state.phase!=="results"&&normalized.phase==="results"){
    patch.phase="results";
    patch["kniffel/phase"]="results";
    if(normalized.winner){
      patch["kniffel/winner"]=normalized.winner;
      if(players[normalized.winner]) patch[`players/${normalized.winner}/score`]=safeNum(players[normalized.winner].score)+1;
    }
    patch["kniffel/turn"]=null;
    patch["kniffel/dice"]=emptyKniffelDice();
    patch["kniffel/held"]=emptyKniffelHeld();
    patch["kniffel/rolls"]=0;
    patch["kniffel/rollingUntil"]=0;
    patch["kniffel/rollingMask"]=emptyKniffelRollingMask();
  }
  return Object.keys(patch).length?patch:null;
}

      patch["drawing/order"]=playerIds;
      patch["drawing/drawer"]=null;
      patch["drawing/word"]="";
      patch["drawing/roundStartTs"]=null;
      patch["drawing/strokes"]=null;
      patch["drawing/guesses"]=null;
      patch["drawing/guessed"]=null;
      patch["drawing/lastCorrect"]=null;
      patch["drawing/winner"]=null;
      return patch;
    }
    if(d.phase!=="playing") patch["drawing/phase"]="playing";
    if(!d.word){
      const mode=drawingWordMode(d.wordMode||"mixed");
      const picked=drawingPickWord(d.usedWords||[],mode);
      patch["drawing/word"]=picked.word;
      patch["drawing/wordIndex"]=Math.max(0,DRAWING_WORDS.indexOf(picked.word));
      patch["drawing/wordMode"]=mode;
      patch["drawing/usedWords"]=picked.usedWords;
    }
    if(!safeNum(d.roundStartTs)) patch["drawing/roundStartTs"]=Date.now();
    if(Date.now()>=drawingEndTime(d)){
      patch.phase="results";
      patch["drawing/phase"]="results";
      patch["drawing/lastCorrect"]=null;
      patch["drawing/winner"]=null;
    }
    return Object.keys(patch).length?patch:null;
  }

  if(roomPhase==="results"&&d.phase!=="results"){
    patch["drawing/phase"]="results";
  }
  return Object.keys(patch).length?patch:null;
}
function initialMauMauState(order=[]){

function mauMauLobbyStateForPlayers(players={},previous={}){
  const state=initialMauMauState(Object.keys(players||{}));

  state.direction=safeNum(previous?.direction)||1;

}
function mauMauOrder(state){
  const players=state?.players||{};
  const m=state?.maumau||{};
  const existing=(Array.isArray(m.order)?m.order:[]).filter(id=>players[id]);
  const missing=Object.keys(players).filter(id=>!existing.includes(id));
  return [...existing,...missing];
}
function mauMauPlayerName(id){
  return id?(gameState.players?.[id]?.name||"?"):"?";
}
function mauMauCardLabel(card){
  if(!card)return"?";
  if(card.value==="wild")return"Farbwahl";
  return MAUMAU_SPECIAL_LABELS[card.value]||String(card.value||"?");
}
function mauMauCardSymbol(card){
  if(!card)return"?";
  if(card.value==="wild")return"🎨";
  if(card.value==="skip")return"🚫";
  if(card.value==="reverse")return"🔄";
  if(card.value==="draw2")return"+2";
  return String(card.value||"?");
}
function mauMauColorRank(color){
  const idx=MAUMAU_COLORS.indexOf(color);
  return idx>=0?idx:99;
}
function mauMauValueRank(value){
  if(/^\d$/.test(String(value)))return Number(value);
  const ranks={skip:10,reverse:11,draw2:12,wild:13};
  return ranks[value]??99;
}
function mauMauSortedHandEntries(hand){
  return (Array.isArray(hand)?hand:[])
    .map((card,index)=>({card,index}))
    .sort((a,b)=>{
      const colorDiff=mauMauColorRank(a.card?.color)-mauMauColorRank(b.card?.color);
      if(colorDiff!==0)return colorDiff;
      const valueDiff=mauMauValueRank(a.card?.value)-mauMauValueRank(b.card?.value);
      if(valueDiff!==0)return valueDiff;
      return String(a.card?.id||"").localeCompare(String(b.card?.id||""));
    });
}
function mauMauCardHtml(card,{back=false,className=""}={}){

  }

  const isNumber=/^\d$/.test(value);
  const symbol=mauMauCardSymbol(card);

    <div class="maumau-card-symbol">${escHtml(symbol)}</div>

  </div>`;
}
function mauMauCreateDeck(){
  const deck=[];
  MAUMAU_COLORS.forEach(color=>{
    deck.push({id:`${color}_0_0`,color,value:"0"});
    for(let copy=0;copy<2;copy++){
      for(let n=1;n<=9;n++) deck.push({id:`${color}_${n}_${copy}`,color,value:String(n)});
      ["skip","reverse","draw2"].forEach(v=>deck.push({id:`${color}_${v}_${copy}`,color,value:v}));
    }
  });
  for(let i=0;i<4;i++) deck.push({id:`wild_${i}`,color:"wild",value:"wild"});
  return deck;
}
function mauMauShuffle(deck){
  const arr=(deck||[]).map(card=>({...card}));
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function mauMauIsNumberCard(card){
  return !!card&&MAUMAU_COLORS.includes(card.color)&&/^\d$/.test(String(card.value));
}
function mauMauDeal(order){
  const deck=mauMauShuffle(mauMauCreateDeck());
  const hands={};
  order.forEach(id=>{hands[id]=[];});
  for(let r=0;r<7;r++){
    order.forEach(id=>{
      const card=deck.shift();
      if(card) hands[id].push(card);
    });
  }
  let firstIndex=deck.findIndex(mauMauIsNumberCard);
  if(firstIndex<0) firstIndex=0;
  const firstCard=deck.splice(firstIndex,1)[0]||null;
  return {hands,drawPile:deck,discardPile:firstCard?[firstCard]:[],firstCard};
}
function mauMauRandomTurn(order){
  const clean=(order||[]).filter(Boolean);
  return clean.length?clean[Math.floor(Math.random()*clean.length)]:null;
}
function mauMauRoundState(order,round=0){
  const clean=[...new Set((order||[]).filter(Boolean))];
  const dealt=mauMauDeal(clean);
  return {
    ...initialMauMauState(clean),
    phase:"playing",
    order:clean,
    round:safeNum(round)+1,
    direction:1,
    dealer:null,
    turn:mauMauRandomTurn(clean),
    activeColor:dealt.firstCard?.color||"red",
    drawPile:dealt.drawPile,
    discardPile:dealt.discardPile,
    hands:dealt.hands,
    drawnThisTurn:null,
    drawStack:0,
    mauCalled:{},
    moveCount:0,
    winner:null,
    lastAction:"Karten ausgeteilt"
  };
}
function mauMauHandCount(state,pid){
  const hand=state?.maumau?.hands?.[pid];
  return Array.isArray(hand)?hand.length:0;
}
function mauMauTopCard(m){
  const pile=Array.isArray(m?.discardPile)?m.discardPile:[];
  return pile[pile.length-1]||null;
}
function mauMauCanPlay(card,m){
  if(!card||!m)return false;
  if(safeNum(m.drawStack)>0){
    return card.value==="draw2";
  }
  if(card.value==="wild")return true;
  const top=mauMauTopCard(m);
  if(!top)return true;
  return card.color===m.activeColor||card.color===top.color||card.value===top.value;
}
function mauMauHasPlayable(hand,m){
  return (hand||[]).some(card=>mauMauCanPlay(card,m));
}
function mauMauNextPlayer(order,currentId,direction=1,steps=1){
  const clean=(order||[]).filter(Boolean);
  if(!clean.length)return null;
  const idx=Math.max(0,clean.indexOf(currentId));
  const dir=direction===-1?-1:1;
  const next=(idx+(steps*dir)+clean.length*10)%clean.length;
  return clean[next];
}
function mauMauEnsurePiles(m){
  if(!Array.isArray(m.drawPile))m.drawPile=[];
  if(!Array.isArray(m.discardPile))m.discardPile=[];
  if(m.drawPile.length===0&&m.discardPile.length>1){
    const top=m.discardPile[m.discardPile.length-1];
    m.drawPile=mauMauShuffle(m.discardPile.slice(0,-1));
    m.discardPile=[top];
  }
}
function mauMauDrawCards(m,pid,count=1){
  if(!m.hands)m.hands={};
  if(!Array.isArray(m.hands[pid]))m.hands[pid]=[];
  for(let i=0;i<count;i++){
    mauMauEnsurePiles(m);
    const card=m.drawPile.shift();
    if(card)m.hands[pid].push(card);
  }
  if(m.mauCalled) delete m.mauCalled[pid];
}
function mauMauApplyCardEffect(m,playerId,card,chosenColor){
  m.drawnThisTurn=null;
  const order=(m.order||[]).filter(Boolean);
  let direction=safeNum(m.direction)===-1?-1:1;
  let steps=1;
  let action=`${mauMauPlayerName(playerId)} legt ${mauMauCardLabel(card)}`;
  if(card.value==="wild"){
    m.activeColor=MAUMAU_COLORS.includes(chosenColor)?chosenColor:"red";
    action=`${mauMauPlayerName(playerId)} wählt ${MAUMAU_COLOR_LABELS[m.activeColor]}`;
  }else{
    m.activeColor=card.color;
  }
  if(card.value==="skip"){
    steps=2;
    action=`${mauMauPlayerName(playerId)} setzt aus`;
  }else if(card.value==="reverse"){
    direction=direction===1?-1:1;
    steps=order.length===2?2:1;
    action=`${mauMauPlayerName(playerId)} wechselt die Richtung`;
  }else if(card.value==="draw2"){
    m.drawStack=safeNum(m.drawStack)+2;
    steps=1;
    action=`${mauMauPlayerName(playerId)} legt +2 · Stapel: ${m.drawStack}`;
  }else{
    m.drawStack=0;
  }
  m.direction=direction;
  m.turn=mauMauNextPlayer(order,playerId,direction,steps);
  m.lastAction=action;
}

function reconcileMauMauStatePatch(state){
  if(!state||state.gameType!=="maumau")return null;
  const players=state.players||{};
  const raw=state.maumau||{};
  const patch={};
  if((state.phase||"lobby")==="lobby"){
    const desiredOrder=Object.keys(players||{});
    const rawOrder=Array.isArray(raw.order)?raw.order.filter(id=>players[id]):[];
    if(raw.phase!=="lobby") patch["maumau/phase"]="lobby";
    if(JSON.stringify(rawOrder)!==JSON.stringify(desiredOrder)) patch["maumau/order"]=desiredOrder;
    if(raw.turn!=null) patch["maumau/turn"]=null;
    if(raw.activeColor) patch["maumau/activeColor"]="";
    if(raw.drawnThisTurn!=null) patch["maumau/drawnThisTurn"]=null;
    if(safeNum(raw.drawStack)!==0) patch["maumau/drawStack"]=0;
    if(raw.mauCalled!=null) patch["maumau/mauCalled"]=null;
    if(raw.drawPile!=null) patch["maumau/drawPile"]=null;
    if(raw.discardPile!=null) patch["maumau/discardPile"]=null;
    if(raw.hands!=null) patch["maumau/hands"]=null;
    if(raw.winner!=null) patch["maumau/winner"]=null;
    if(raw.lastAction) patch["maumau/lastAction"]="";
    return Object.keys(patch).length?patch:null;
  }
  return null;
}
function reconcileBattleshipSeatsPatch(state){ 
  if(!state||state.gameType!=="battleship")return null;
  const players=state.players||{};
  const ids=Object.keys(players);
  if(ids.length===0)return null;
  const bs=state.battleship||{};
  const seats={...(bs.seats||{})};
  let changed=false;
  let resetGame=false;

  if(!seats.p1||!players[seats.p1]){
    seats.p1=(state.host&&players[state.host])?state.host:ids[0];
    changed=true;
    resetGame=true;
  }
  if(seats.p2&&!players[seats.p2]){
    seats.p2=null;
    changed=true;
    resetGame=true;
  }
  if(seats.p2===seats.p1){
    seats.p2=null;
    changed=true;
    resetGame=true;
  }
  // Anders als bei Vier gewinnt bleiben freie Plätze bei Schiffe versenken frei,
  // damit Spieler bewusst einen Platz übernehmen können.
  if(!changed)return null;

  const patch={"battleship/seats":seats};
  if(resetGame&&state.phase!=="lobby"){
    patch.phase="lobby";
    patch["battleship/phase"]="lobby";
    patch["battleship/boards"]={};
    patch["battleship/ready"]={};
    patch["battleship/turn"]="p1";
    patch["battleship/winner"]=null;
    patch["battleship/lastShot"]=null;
  }
  return patch;
}

async function copyTextToClipboard(text){
  if(navigator.clipboard?.writeText && window.isSecureContext!==false){
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta=document.createElement("textarea");
  ta.value=text;
  ta.setAttribute("readonly","");
  ta.style.position="fixed";
  ta.style.left="-9999px";
  ta.style.top="0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const ok=document.execCommand("copy");
  document.body.removeChild(ta);
  if(!ok)throw new Error("copy failed");
}

window.createRoom=async function(){
  try { getAudioCtx(); } catch(e) {}
  selectedGame=validGameId(selectedGame);
  sessionStorage.setItem(SELECTED_GAME_SESSION_KEY,selectedGame);
  myName=document.getElementById("input-name").value.trim();
  if(!myName){
    const el=document.getElementById("join-error");
    if(el){el.textContent="Bitte zuerst deinen Namen eingeben.";el.style.display="block";}
    return;
  }
  let connected=false;
  setJoinBusy(true);
  showError("Erstelle Raum…");
  try{
    for(let attempt=0;attempt<12;attempt++){
      const code=generateRoomCode();
      const snap=await get(ref(db,`rooms/${code}`));
      let existing=snap.exists()?snap.val():null;
      if(existing?.createdAt&&Date.now()-existing.createdAt>ROOM_EXPIRY_MS)existing=null;
      if(existing)continue;
      myRoom=code;
      isHost=true;
      document.getElementById("input-room").value=code;
      await set(roomRef(),initialRoomData());
      await finishRoomConnection();
      connected=true;
      return;
    }
    showError("Konnte keinen freien Raum-Code finden. Bitte nochmal versuchen.");
  }catch(e){
    showError("Fehler: "+e.message);
  }finally{
    if(!connected){
      myRoom="";
      isHost=false;
      setJoinBusy(false);
    }
  }
};

window.joinExistingRoom=async function(opts={}){
  try { getAudioCtx(); } catch(e) {}
  myName=document.getElementById("input-name").value.trim();
  myRoom=normalizeRoomCode(document.getElementById("input-room").value);
  document.getElementById("input-room").value=myRoom;
  if(!myName||!myRoom){showError("Bitte Name und Raum-Code eingeben.");return;}
  setJoinBusy(true);
  showError(opts.auto?"Verbinde erneut…":"Trete Raum bei…");
  try{
    const snap=await get(roomRef());
    let existing=snap.exists()?snap.val():null;
    if(existing?.createdAt&&Date.now()-existing.createdAt>ROOM_EXPIRY_MS)existing=null;
    if(!existing){
      if(opts.auto){
        clearJoinSession();
        showError("Gespeicherter Raum existiert nicht mehr. Erstelle einen neuen Raum oder tritt einem bestehenden Raum bei.");
      }else{
        showError("Diesen Raum gibt es nicht. Prüfe den Code oder erstelle einen neuen Raum.");
      }
      setJoinBusy(false);
      return;
    }
    const roomGame=existing.gameType||"slf";
    if(!GAMES[roomGame]?.enabled){
      showError("Dieses Spiel wird von dieser Version nicht unterstützt.");
      setJoinBusy(false);
      return;
    }
    selectedGame=roomGame;
    sessionStorage.setItem(SELECTED_GAME_SESSION_KEY,selectedGame);
    updateJoinScreen();
    if(roomGame==="kniffel"&&!existing.players?.[myId]&&Object.keys(existing.players||{}).length>=KNIFFEL_MAX_PLAYERS){
      showError(`Kniffel ist voll (${KNIFFEL_MAX_PLAYERS} Spieler).`);
      setJoinBusy(false);
      return;
    }
    if(roomGame==="drawing"&&!existing.players?.[myId]&&Object.keys(existing.players||{}).length>=DRAWING_MAX_PLAYERS){
      showError(`Montagsmaler ist voll (${DRAWING_MAX_PLAYERS} Spieler).`);
      setJoinBusy(false);
      return;
    }
    if(roomGame==="maumau"&&!existing.players?.[myId]&&Object.keys(existing.players||{}).length>=MAUMAU_MAX_PLAYERS){
      showError(`Mau Mau ist voll (${MAUMAU_MAX_PLAYERS} Spieler).`);
      setJoinBusy(false);
      return;
    }
    isHost=existing.host===myId;
    const patch={[`players/${myId}`]:playerRoomData(existing.players?.[myId]||null,existing.players||{})};
    if(roomGame==="connect4"){
      const seats=existing.connect4?.seats||{};
      if(!seats.red) patch[`connect4/seats/red`]=existing.host||myId;
      if(myId!==seats.red && !seats.yellow) patch[`connect4/seats/yellow`]=myId;
    }
    if(roomGame==="battleship"){
      const seats=existing.battleship?.seats||{};
      if(!seats.p1) patch[`battleship/seats/p1`]=existing.host||myId;
      if(myId!==seats.p1 && !seats.p2) patch[`battleship/seats/p2`]=myId;
    }
    if(roomGame==="kniffel"&&!existing.kniffel){
      patch.kniffel=initialKniffelState();
    }
    if(roomGame==="drawing"&&!existing.drawing){
      patch.drawing=initialDrawingState();
    }
    if(roomGame==="maumau"&&!existing.maumau){
      patch.maumau=initialMauMauState();
    }
    await updateRoomData(patch);
    await finishRoomConnection();
  }catch(e){
    showError("Fehler: "+e.message);
    setJoinBusy(false);
  }
};

  const type=gameState.gameType||"slf";
  const remaining=remainingPlayersWithout(pid);
  if(type==="connect4"){
    const seats=gameState.connect4?.seats||{};
    if(seats.red===pid) patch["connect4/seats/red"]=null;
    if(seats.yellow===pid) patch["connect4/seats/yellow"]=null;
  }else if(type==="battleship"){
    const seats=gameState.battleship?.seats||{};
    if(seats.p1===pid) patch["battleship/seats/p1"]=null;
    if(seats.p2===pid) patch["battleship/seats/p2"]=null;
  }else if(type==="kniffel"){
    patch.kniffel=initialKniffelState(Object.keys(remaining));
  }else if(type==="drawing"){
    patch.drawing=drawingLobbyStateForPlayers(remaining,gameState.drawing||{});
  }else if(type==="maumau"){
    patch.maumau=mauMauLobbyStateForPlayers(remaining,gameState.maumau||{});
